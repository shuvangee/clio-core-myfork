# IOWarp Quickstart - Docker Compose
#
# Single-node Clio runtime for getting started quickly.
#
# Usage:
#   docker compose up -d        # Start in background
#   docker compose logs -f      # Follow logs
#   docker compose down         # Stop runtime

services:
  iowarp:
    image: iowarp/deploy-cpu:latest
    container_name: iowarp-quickstart
    hostname: iowarp
    volumes:
      - ./clio.yaml:/etc/iowarp/clio.yaml:ro
    environment:
      - CLIO_SERVER_CONF=/etc/iowarp/clio.yaml
    ports:
      - "9413:9413"
    mem_limit: 8g
    command: ["clio_run", "start"]
    restart: unless-stopped
