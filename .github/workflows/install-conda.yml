name: Build and Publish Conda Package

on:
  workflow_dispatch:
    inputs:
      preset:
        description: 'CMake preset to build'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - cuda
          - rocm
  push:
    branches: main
    tags: ['v*']

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          channels: conda-forge,defaults
          channel-priority: strict

      - name: Install conda-build
        shell: bash -l {0}
        run: |
          # setup-miniconda activates the "test" env; the `conda build`
          # subcommand is only registered when conda-build lives in the
          # base env (otherwise: "conda: error: ... invalid choice: 'build'").
          conda install -y -n base conda-build anaconda-client

      - name: Determine preset
        id: preset
        shell: bash -l {0}
        run: |
          PRESET="${{ github.event.inputs.preset || 'release' }}"
          echo "name=${PRESET}" >> "$GITHUB_OUTPUT"

      - name: Build conda package
        shell: bash -l {0}
        run: |
          export IOWARP_PRESET="${{ steps.preset.outputs.name }}"
          conda build installers/conda/ \
            -c conda-forge \
            --no-anaconda-upload \
            --output-folder build/conda-output

      - name: Upload to Anaconda.org
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          for pkg in build/conda-output/**/*.conda build/conda-output/**/*.tar.bz2; do
            [ -f "$pkg" ] || continue
            anaconda -t "$ANACONDA_TOKEN" upload --user iowarp --force "$pkg"
          done
