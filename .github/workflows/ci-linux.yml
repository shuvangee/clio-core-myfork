name: CI Linux

# Consolidated Linux build-and-test pipeline (issue #649). One workflow per OS:
# the standard release+coverage build plus every Linux flag-variant as a
# parallel job in the SAME workflow, replacing four separate files —
#   build-and-test.yml (Linux half), boost-coroutines.yml (docker/linux/arm),
#   sanitizers.yml (asan/ubsan/msan), and leak-check.yml.
# All variants run on every PR and on push to main/dev (per #649 decision).

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Phased build + ctest + coverage --------------------------------------
  # Each phase builds only the config it needs, runs only its labeled tests, and
  # uploads coverage scoped to the code it exercises under its own Codecov flag
  # (issue: phased coverage). Codecov merges the flags (carryforward on) into one
  # report. The multi-node cluster phase (deps-cpu container + docker-compose
  # node containers, with gcov pulled out of the nodes) is folded in next; until
  # then it still runs, without coverage, in cluster-tests.yml.
  build-test:
    name: build-test (${{ matrix.phase }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core unit tests: everything except adapter/integration/docker/cae/cee
          # (PHASE_CTEST_INCLUDE_LABELS empty => script's default exclude set).
          - phase: unit
            arch: amd64
            os: ubuntu-24.04
            site: ubu-24.amd64.unit
            flag: unit
            apt: ""
            cmake_args: ""
            labels: ""
            extract: ""
          - phase: unit
            arch: arm64
            os: ubuntu-24.04-arm
            site: ubu-24.arm64.unit
            flag: unit
            apt: ""
            cmake_args: ""
            labels: ""
            extract: ""
          # FUSE adapter: native libfuse3, run FUSE/adapter tests, scope coverage
          # to the adapter tree.
          - phase: fuse
            arch: amd64
            os: ubuntu-24.04
            site: ubu-24.amd64.fuse
            flag: fuse
            apt: "libfuse3-dev fuse3"
            # System libfuse3's fuse3.pc lives here; the conda build otherwise
            # only sees the conda env's pkg-config path and reports FUSE3 missing.
            pkgconfig: "/usr/lib/x86_64-linux-gnu/pkgconfig"
            cmake_args: "-DCLIO_CTE_ENABLE_FUSE_ADAPTER=ON -DCLIO_CTE_ENABLE_FILESYSTEM=ON"
            labels: "fuse|adapter"
            # Skip the live-mount suites (real FUSE mount needs /dev/fuse +
            # privileges); those run in ci-adapters' mount-smoke step for now.
            exclude_labels: "docker|copy_workspace|integration"
            # Scope to BOTH the adapter tree and the filesystem (CFS) tree: the
            # FUSE adapter (fuse_cte.cc / cfs_io.h) sits on top of the CFS
            # filesystem client+runtime and the fuse|adapter unit tests exercise
            # it, so its coverage must be uploaded too. Extracting adapter/*
            # alone silently dropped context-transfer-engine/filesystem/**,
            # making filesystem_client/runtime/tasks read 0% on Codecov even
            # though the fuse phase runs them.
            extract: "*/context-transfer-engine/adapter/* */context-transfer-engine/filesystem/*"
          # Context Assimilation Engine
          - phase: cae
            arch: amd64
            os: ubuntu-24.04
            site: ubu-24.amd64.cae
            flag: cae
            apt: ""
            cmake_args: "-DCLIO_CORE_ENABLE_CAE=ON"
            labels: "cae"
            extract: "*/context-assimilation-engine/*"
          # Context Exploration Engine
          - phase: cee
            arch: amd64
            os: ubuntu-24.04
            site: ubu-24.amd64.cee
            flag: cee
            apt: ""
            cmake_args: "-DCLIO_CORE_ENABLE_CEE=ON"
            labels: "cee"
            extract: "*/context-exploration-engine/*"
          # Drive-failure prediction: stands up the real Python model server and
          # drives a LightGBM inference through the C++ prediction path and the
          # bdev Monitor("stats") entry point. Runs the prediction_e2e-labelled
          # tests (direct C++ E2E + full bdev->model integration). Needs the
          # Git-LFS models and the server's Python deps, both installed below.
          - phase: prediction
            arch: amd64
            os: ubuntu-24.04
            site: ubu-24.amd64.prediction
            flag: prediction
            apt: "python3-venv"
            cmake_args: ""
            labels: "prediction_e2e"
            extract: "*/prediction_server/* */context-transport-primitives/src/system_info.cc */context-runtime/modules/bdev/*"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install lcov (+ phase deps)
        run: sudo apt-get update && sudo apt-get install -y lcov ${{ matrix.apt }}
      - name: Install project dependencies (CI/ci-deps.sh)
        run: |
          chmod +x CI/ci-deps.sh
          ./CI/ci-deps.sh
      # The prediction phase's E2E tests SKIP without the trained models and the
      # server's Python deps; provide both so they actually run.
      - name: Pull prediction models (Git LFS)
        if: matrix.phase == 'prediction'
        run: git lfs pull --include="prediction_server/models/*.pkl"
      - name: Install prediction server deps
        if: matrix.phase == 'prediction'
        run: |
          # Isolated venv (mirrors local validation) so the E2E driver's
          # interpreter definitely carries fastapi/uvicorn/scikit-learn/lightgbm/
          # joblib/pandas/numpy. Installing into the conda env instead left them
          # unreachable to the python3 that ctest's driver actually invokes, so
          # the tests SKIPped. Export the venv python via GITHUB_ENV as
          # PREDICT_PYTHON; the driver scripts prefer it over python3.
          python3 -m venv "$HOME/predenv"
          "$HOME/predenv/bin/pip" install --quiet --upgrade pip
          "$HOME/predenv/bin/pip" install --quiet -r prediction_server/requirements.txt
          echo "PREDICT_PYTHON=$HOME/predenv/bin/python" >> "$GITHUB_ENV"
      - name: Calculate coverage (${{ matrix.phase }})
        env:
          PHASE_CMAKE_ARGS: ${{ matrix.cmake_args }}
          PHASE_CTEST_INCLUDE_LABELS: ${{ matrix.labels }}
          PHASE_CTEST_EXCLUDE_LABELS: ${{ matrix.exclude_labels }}
          PHASE_EXTRACT_PATHS: ${{ matrix.extract }}
          PKG_CONFIG_PATH: ${{ matrix.pkgconfig }}
        run: |
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          ./CI/calculate_coverage.sh --build --run-ctest --clean --site ${{ matrix.site }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage_filtered.info
          flags: ${{ matrix.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: iowarp/clio-core

  # ---- Boost.Context stackful coroutine backend (#620) ----------------------
  # Docker (deps-cpu) is the canonical reproducible build; native + arm64 cover
  # the io_uring path the container seccomp profile blocks, and the arm64 memory
  # model.
  boost-docker:
    name: boost (docker deps-cpu)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build with Boost backend + run ctest (inside deps-cpu)
        run: |
          # --shm-size: docker's default /dev/shm is 64 MB, far too small for the
          # clio runtime's GB-scale SHM segments; a 1 MB blob PutBlob in
          # cte_tiered_storage_all then fails (rc=21) where native builds pass.
          docker run --rm --shm-size=2g -v "${{ github.workspace }}":/workspace -w /workspace -u 0 \
            iowarp/deps-cpu:latest bash -c '
              set -e
              export LD_LIBRARY_PATH=/usr/local/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
              export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
              git config --global --add safe.directory /workspace
              (dpkg -s libboost-context-dev >/dev/null 2>&1) || \
                (apt-get update -qq && apt-get install -y -qq libboost-context-dev libboost-dev)
              cmake --preset boost
              cmake --build build-boost -j"$(nproc)"
              cd build-boost
              # -LE "force_net": the CLIO_FORCE_NET loopback-network stress
              # variants are single-node net-path tests (some CI-only flaky,
              # e.g. #579); they are covered by the leak + cluster jobs and do
              # not belong in this containerized build. Excluded by label so
              # new force_net tests are handled automatically.
              #
              # -E excludes tests incompatible with THIS docker variant
              # specifically -- they pass on the native amd64 + arm64 boost
              # jobs (verified), which provide the real coverage:
              #  * cte_tiered_storage_all and cte_tiered_dram_default_all --
              #    the reorganize-down leg intermittently fails a few blob
              #    PutBlobs with rc=7 (3/96) ONLY in the constrained deps-cpu
              #    container. Enlarging the slow file tier to hold the whole
              #    working set was tried and did NOT help, so the binding
              #    constraint is the deps-cpu container memory/CPU limits
              #    during the rapid Get/Del/Put reorganize burst, not the tier
              #    size. The
              #    failure count varies run to run (95 vs 93 /96), consistent
              #    with a transient container-resource limit rather than a code
              #    bug. Tracked for a deeper in-container bdev-allocation fix.
              #  * ctp_async_io -- unrelated deps-cpu incompatibility.
              ctest --output-on-failure --timeout 180 --repeat until-pass:3 -LE "ollama|force_net" -E "ctp_async_io|cte_tiered_storage_all|cte_tiered_dram_default_all"
            '

  boost-native:
    name: boost (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev liburing-dev
      - name: Install dependencies (conda env, incl. Boost.Context)
        run: |
          chmod +x CI/ci-deps.sh
          ./CI/ci-deps.sh --only-deps
      - name: Build with Boost backend + run ctest
        run: |
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          cmake --preset boost
          cmake --build build-boost -j"$(nproc)"
          ctest --test-dir build-boost --output-on-failure --timeout 180 --repeat until-pass:3 -LE "ollama"

  # ---- Sanitizers: asan / ubsan / msan --------------------------------------
  sanitizers:
    name: sanitizer (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan, msan]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install sanitizer runtime libraries (ASan/UBSan)
        if: matrix.sanitizer != 'msan'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasan8 libubsan1 libhdf5-dev
      - name: Install Clang for MSan
        if: matrix.sanitizer == 'msan'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libhdf5-dev
      - name: Build and test with ${{ matrix.sanitizer }}
        run: |
          chmod +x CI/ci-deps.sh CI/run_sanitizers.sh
          ./CI/ci-deps.sh
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          ./CI/run_sanitizers.sh \
            --${{ matrix.sanitizer }} \
            --build \
            --site "ubu-24.amd64"

  # ---- Leak check (gating allocation-leak detection, #560/#563) -------------
  leak-check:
    name: leak-check
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev liburing-dev
      - name: Install dependencies (conda env)
        run: |
          chmod +x CI/ci-deps.sh
          ./CI/ci-deps.sh --only-deps
      - name: Build with leak tracking and run leak tests
        run: |
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          cmake --preset=leak-check
          cmake --build build-leak -j"$(nproc)"
          # In a leak-tracking build every test auto-checks that the runtime
          # private heap returns to its pre-test level. Run the calibrated
          # force-net suites + the per-RPC leak test. cte_tag_force_net /
          # cte_query_force_net are excluded (pre-existing CI-only hang, #579).
          ctest --test-dir build-leak \
            -R "leak|cr_streaming_force_net|cte_.*force_net" \
            -E "cte_tag_force_net|cte_query_force_net" \
            --output-on-failure --no-tests=error
