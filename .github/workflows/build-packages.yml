name: Build and Publish Binary Packages

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  #-----------------------------------------------------------------------
  # Guard: tag must match CMakeLists.txt version (same check as build-pip.yml)
  #-----------------------------------------------------------------------
  check-version:
    name: Check tag matches version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify tag == CMakeLists.txt version
      run: |
        set -e
        TAG="${GITHUB_REF_NAME#v}"
        CMAKE_VERSION=$(grep -oP 'project\(iowarp-core VERSION \K[\d.]+' CMakeLists.txt)
        echo "Git tag version:        $TAG"
        echo "CMakeLists.txt version: $CMAKE_VERSION"
        if [ "$TAG" != "$CMAKE_VERSION" ]; then
          echo "::error::Tag '$GITHUB_REF_NAME' does not match CMakeLists.txt version '$CMAKE_VERSION'."
          echo "::error::Bump 'project(iowarp-core VERSION ...)' in CMakeLists.txt to $TAG and re-tag."
          exit 1
        fi
        echo "Version check passed."

  #-----------------------------------------------------------------------
  # Build .deb on Ubuntu
  #
  # Previously ran inside `iowarp/clio-core-devcontainer:latest`, which is
  # not pulled into a public registry the GHA runner can access (Docker
  # pull failed with "access denied" at v1.9.0). Run natively on
  # ubuntu-latest and `apt-get install` deps inline — same shape the RPM
  # job already uses for Fedora.
  #-----------------------------------------------------------------------
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build build-essential pkg-config \
          libzmq3-dev libyaml-cpp-dev libcereal-dev libmsgpack-dev \
          libsodium-dev

    - name: Configure with CMake
      run: |
        cmake -B build-deb \
          -DCLIO_CORE_ENABLE_DEB_PACKAGE=ON \
          -DCLIO_CORE_ENABLE_TESTS=OFF \
          -DCLIO_CORE_ENABLE_PYTHON=OFF \
          -G Ninja

    - name: Build with CMake
      run: cmake --build build-deb -j$(nproc)

    - name: Create DEB package
      run: |
        cd build-deb
        cpack -G DEB

    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: deb-package
        path: build-deb/*.deb

  #-----------------------------------------------------------------------
  # Build .rpm on Fedora (in a container)
  #
  # fedora:40 ships without git in the base image, so actions/checkout@v4
  # falls back to the REST API which doesn't support submodules. Install
  # git BEFORE the checkout step so it can use the native git path.
  #-----------------------------------------------------------------------
  build-rpm:
    name: Build RPM package
    runs-on: ubuntu-latest
    container: fedora:40
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    steps:
    - name: Install git (required for actions/checkout submodule mode)
      run: dnf install -y git

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        dnf install -y cmake ninja-build gcc-c++ pkgconf-pkg-config \
          zeromq-devel yaml-cpp-devel cereal-devel msgpack-devel \
          libsodium-devel rpm-build

    - name: Configure with CMake
      run: |
        cmake -B build-rpm \
          -DCLIO_CORE_ENABLE_RPM_PACKAGE=ON \
          -DCLIO_CORE_ENABLE_TESTS=OFF \
          -DCLIO_CORE_ENABLE_PYTHON=OFF \
          -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
          -G Ninja

    - name: Build with CMake
      run: cmake --build build-rpm -j$(nproc)

    - name: Create RPM package
      run: |
        cd build-rpm
        cpack -G RPM

    - name: Upload RPM artifact
      uses: actions/upload-artifact@v4
      with:
        name: rpm-package
        path: build-rpm/*.rpm

  #-----------------------------------------------------------------------
  # Build AppImage on Ubuntu
  # appimagetool is downloaded at build time; APPIMAGE_EXTRACT_AND_RUN=1
  # lets it run without a FUSE mount (no --privileged needed).
  #
  # Same devcontainer-image fix as build-deb: run natively on
  # ubuntu-latest with deps installed inline.
  #-----------------------------------------------------------------------
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build build-essential pkg-config wget file \
          libzmq3-dev libyaml-cpp-dev libcereal-dev libmsgpack-dev \
          libsodium-dev

    - name: Configure with CMake
      run: |
        cmake -B build-appimage \
          -DCLIO_CORE_ENABLE_APPIMAGE=ON \
          -DCLIO_CORE_ENABLE_TESTS=OFF \
          -DCLIO_CORE_ENABLE_PYTHON=OFF \
          -G Ninja

    - name: Build with CMake
      run: cmake --build build-appimage -j$(nproc)

    - name: Build AppImage target
      run: cmake --build build-appimage --target appimage

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: appimage
        path: build-appimage/*.AppImage

  #-----------------------------------------------------------------------
  # Publish all artifacts to GitHub Release on tag
  #
  # softprops/action-gh-release appends to an existing release when one
  # exists (created by build-pip.yml's github-release job), or creates a
  # new one if not. fail_on_unmatched_files=true so a missing artifact
  # is surfaced as a job failure instead of silently shipping a partial
  # release.
  #-----------------------------------------------------------------------
  publish-release:
    name: Publish to GitHub Release
    needs: [build-deb, build-rpm, build-appimage]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - name: Download DEB package
      uses: actions/download-artifact@v4
      with:
        name: deb-package
        path: packages/

    - name: Download RPM package
      uses: actions/download-artifact@v4
      with:
        name: rpm-package
        path: packages/

    - name: Download AppImage
      uses: actions/download-artifact@v4
      with:
        name: appimage
        path: packages/

    - name: List packages
      run: ls -lh packages/

    - name: Attach packages to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: packages/*
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
