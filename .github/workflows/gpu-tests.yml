name: GPU Tests (CUDA)

on:
  push:
    branches: [main, dev]
    paths:
      - 'context-runtime/**'
      - 'context-transfer-engine/**'
      - 'context-transport-primitives/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'installers/conda/**'
      - '.github/workflows/gpu-tests.yml'
  workflow_dispatch:

jobs:
  build-cuda-conda:
    name: Build CUDA conda package (compile only)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: recursive

    # ── Install CUDA toolkit ──────────────────────────────────────────
    - name: Install CUDA toolkit
      run: |
        if ! command -v nvcc &>/dev/null; then
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y -qq cuda-toolkit-12-6 cuda-driver-dev-12-6
        fi
        echo "/usr/local/cuda/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Verify CUDA
      run: nvcc --version

    # ── Install Miniconda + conda-build ──────────────────────────────
    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: false
        python-version: '3.12'
        activate-environment: iowarp

    # conda-build is a plugin registered against the BASE env's conda CLI and
    # must be installed there (see installers/conda + install.sh). Without
    # `-n base` this installs conda-build into the active `iowarp` env, leaving
    # an `iowarp/bin/conda` ahead of base on PATH that can't import the `conda`
    # module — so conda-build's build-env activation crashes the recipe with
    # "ModuleNotFoundError: No module named 'conda'".
    - name: Install conda-build
      shell: bash -el {0}
      run: conda install -n base -y conda-build -c conda-forge

    # ── Build CUDA conda package via install.sh ──────────────────────
    - name: Build CUDA conda package
      shell: bash -el {0}
      run: |
        chmod +x install.sh
        ./install.sh cuda-release

    # ── Verify installation ──────────────────────────────────────────
    - name: Verify CUDA package installed
      shell: bash -el {0}
      run: |
        conda list iowarp
        test -f "$CONDA_PREFIX/lib/libclio_run_cxx.so"
        test -f "$CONDA_PREFIX/lib/libclio_run_cxx_gpu.so"
        echo "CUDA conda package installed successfully"

    # NOTE: GPU tests are disabled until self-hosted GPU runners are available.
    # To re-enable, change runs-on to [self-hosted, gpu], add nvidia-smi
    # verification step, and uncomment the test steps below.
    #
