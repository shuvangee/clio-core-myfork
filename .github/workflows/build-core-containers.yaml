name: Build Core Containers

on:
  workflow_dispatch:
  workflow_call:
  # Trigger on changes to source code or build Dockerfiles
  push:
    branches:
      - main
    paths:
      - 'docker/deploy-cpu.Dockerfile'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'context-runtime/**'
      - 'context-transfer-engine/**'
      - 'context-assimilation-engine/**'
      - 'context-exploration-engine/**'
      - 'context-transport-primitives/**'
  # Build-only regression gate on PRs: build the deploy + benchmark images (and,
  # via rebuild-deps, the dependency images) to catch container breakage before
  # merge. Nothing is pushed or tagged into a manifest -- every publish step is
  # guarded on github.event_name != 'pull_request'. Also covers the benchmark
  # Dockerfiles, which the push trigger above does not watch.
  pull_request:
    branches: [main, dev]
    paths:
      - 'docker/deploy-cpu.Dockerfile'
      - 'docker/deps-cpu.Dockerfile'
      - 'docker/redis_bench/Dockerfile'
      - 'docker/clio_cte_bench/Dockerfile'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'context-runtime/**'
      - 'context-transfer-engine/**'
      - 'context-assimilation-engine/**'
      - 'context-exploration-engine/**'
      - 'context-transport-primitives/**'
      - '.github/workflows/build-core-containers.yaml'
      - '.github/workflows/build-dep-containers.yaml'

concurrency:
  group: build-core-containers-${{ github.ref }}
  cancel-in-progress: true

env:
  # Present on push + internal-branch PRs; empty on forked-PR runs, which skips
  # the Docker Hub login below (public base images still pull fine anonymously).
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  # Rebuild deps-cpu image first when its Dockerfile changed in this push.
  # Uses workflow_call so the core builds below wait for the fresh base image.
  rebuild-deps:
    name: Rebuild dependency containers
    uses: ./.github/workflows/build-dep-containers.yaml
    secrets: inherit
  # Deploy containers - AMD64
  deploy-cpu-amd64:
    name: Build Deploy Container (AMD64)
    needs: rebuild-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push deploy-cpu (AMD64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/deploy-cpu.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: iowarp/deploy-cpu:latest-amd64
          # GitHub Actions cache, not Docker Hub registry cache. The
          # deploy-cpu buildcache caches the full compiled clio-core
          # tree (~250MB+ layers); importing it from Docker Hub
          # routinely stalled mid-download and timed the job out at
          # 60min (alternating arch each run). type=gha is co-located
          # with the runner, so it keeps the expensive compile cached
          # without the flaky Docker Hub pull. Scope is per-arch to
          # avoid amd64/arm64 cache collisions.
          cache-from: type=gha,scope=deploy-cpu-amd64
          cache-to: type=gha,scope=deploy-cpu-amd64,mode=max

  # Deploy containers - ARM64
  deploy-cpu-arm64:
    name: Build Deploy Container (ARM64)
    needs: rebuild-deps
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push deploy-cpu (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/deploy-cpu.Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: iowarp/deploy-cpu:latest-arm64
          # See the amd64 job above: type=gha avoids the Docker Hub
          # registry-buildcache pull that stalled this job out at 60min.
          cache-from: type=gha,scope=deploy-cpu-arm64
          cache-to: type=gha,scope=deploy-cpu-arm64,mode=max

  # Create multi-arch manifest for deploy-cpu
  create-deploy-cpu-manifest:
    name: Create Multi-Arch Manifest (deploy-cpu)
    runs-on: ubuntu-latest
    needs: [deploy-cpu-amd64, deploy-cpu-arm64]
    # No per-arch tags are pushed on a PR, so there is no manifest to stitch.
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag iowarp/deploy-cpu:latest \
            iowarp/deploy-cpu:latest-amd64 \
            iowarp/deploy-cpu:latest-arm64

  # Benchmark containers - AMD64
  build-benchmarks-amd64:
    name: Build Benchmarks (AMD64)
    needs: rebuild-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push redis benchmark (AMD64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/redis_bench/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: iowarp/redis-bench:latest-amd64

      - name: Build and push CTE benchmark (AMD64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/clio_cte_bench/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: iowarp/cte-bench:latest-amd64

  # Benchmark containers - ARM64
  build-benchmarks-arm64:
    name: Build Benchmarks (ARM64)
    needs: rebuild-deps
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push redis benchmark (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/redis_bench/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: iowarp/redis-bench:latest-arm64

      - name: Build and push CTE benchmark (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/clio_cte_bench/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: iowarp/cte-bench:latest-arm64

  # Create multi-arch manifests for benchmarks
  create-benchmark-manifests:
    name: Create Multi-Arch Manifests (benchmarks)
    runs-on: ubuntu-latest
    needs: [build-benchmarks-amd64, build-benchmarks-arm64]
    # No per-arch tags are pushed on a PR, so there is no manifest to stitch.
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Create redis-bench multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag iowarp/redis-bench:latest \
            iowarp/redis-bench:latest-amd64 \
            iowarp/redis-bench:latest-arm64

      - name: Create cte-bench multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag iowarp/cte-bench:latest \
            iowarp/cte-bench:latest-amd64 \
            iowarp/cte-bench:latest-arm64
