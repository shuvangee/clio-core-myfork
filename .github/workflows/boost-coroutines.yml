name: Boost Coroutines

# Recompiles clio-core with the optional Boost.Context stackful coroutine
# backend (CLIO_CORE_ENABLE_BOOST_COROUTINES=ON, issue #620) and runs the ctest
# suite on every supported platform — Linux, macOS, Windows, and the deps-cpu
# Docker image. This is the dedicated "boost phase" that proves the alternative
# coroutine backend stays green cross-platform alongside the default (C++20
# stackless) build covered by the other workflows.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Docker (deps-cpu image) — the canonical reproducible Linux build ------
  docker:
    name: docker (deps-cpu)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build with Boost backend + run ctest (inside deps-cpu)
        run: |
          docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace -u 0 \
            iowarp/deps-cpu:latest bash -c '
              set -e
              export LD_LIBRARY_PATH=/usr/local/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
              export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
              git config --global --add safe.directory /workspace
              (dpkg -s libboost-context-dev >/dev/null 2>&1) || \
                (apt-get update -qq && apt-get install -y -qq libboost-context-dev libboost-dev)
              cmake --preset boost
              cmake --build build-boost -j"$(nproc)"
              cd build-boost
              # ctp_async_io directly exercises the io_uring backend, which the
              # container default seccomp profile blocks (io_uring_setup is
              # denied); it is run by the native Linux job instead. Everything
              # else runs here.
              ctest --output-on-failure --timeout 180 --repeat until-pass:3 -LE "ollama" -E "ctp_async_io"
            '

  # ---- Linux (conda deps via install.sh) ------------------------------------
  linux:
    name: linux (ubuntu-24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev liburing-dev
      - name: Install dependencies (conda env, incl. Boost.Context)
        run: |
          chmod +x install.sh
          ./install.sh --only-deps
      - name: Build with Boost backend + run ctest
        run: |
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          cmake --preset boost
          cmake --build build-boost -j"$(nproc)"
          ctest --test-dir build-boost --output-on-failure --timeout 180 --repeat until-pass:3 -LE "ollama"

  # ---- Linux arm64 (conda deps) — does the macOS/arm64 hang reproduce on a
  #      native, debuggable arm64 box? Disambiguates "arm64 issue" (memory
  #      model) from "macOS/Darwin issue". Free GitHub arm64 runner. (#620) -----
  linux-arm:
    name: linux-arm (ubuntu-24.04-arm)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev liburing-dev
      - name: Install dependencies (conda env, incl. Boost.Context)
        run: |
          chmod +x install.sh
          ./install.sh --only-deps
      - name: Build with Boost backend + run ctest
        run: |
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          cmake --preset boost
          cmake --build build-boost -j"$(nproc)"
          ctest --test-dir build-boost --output-on-failure --timeout 180 --repeat until-pass:3 -LE "ollama"

  # ---- macOS (conda deps via install.sh) ------------------------------------
  macos:
    name: macos (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install dependencies (conda env, incl. Boost.Context)
        run: |
          chmod +x install.sh
          ./install.sh --only-deps release
      - name: Build with Boost backend + run ctest
        run: |
          if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/miniconda3/etc/profile.d/conda.sh"
          elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
            source "$HOME/anaconda3/etc/profile.d/conda.sh"
          elif command -v conda &>/dev/null; then
            eval "$(conda shell.bash hook)"
          fi
          conda activate iowarp
          cmake --preset boost
          cmake --build build-boost -j"$(sysctl -n hw.ncpu)"
          # #619's fallback-runtime punting has no macOS support yet (cross-runtime
          # daemon startup / IPC). Excluded here until iowarp/clio-core#634 lands;
          # these pass on Linux/Windows and are already excluded on the stackless
          # Mac Test (mac-test.yml).
          ctest --test-dir build-boost --output-on-failure --timeout 180 --repeat until-pass:3 \
            -LE "ollama" -E "cr_cli_cte_fallback|cr_cli_fallback_runtime"

  # ---- Windows (vcpkg deps, boost-context feature) --------------------------
  windows:
    name: windows (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            triplet: x64-windows
            arch: x64
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      CAE_LABEL_TEST_SKIP: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Bootstrap vcpkg
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          git pull
          .\bootstrap-vcpkg.bat
      - name: Configure CMake (Boost backend, vcpkg boost-context feature)
        run: |
          cmake -B build-boost -A ${{ matrix.arch }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -DVCPKG_MANIFEST_DIR="${{ github.workspace }}/installers/vcpkg" `
            -DVCPKG_MANIFEST_FEATURES="boost-coroutines" `
            -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}/installers/vcpkg/overlay-ports" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCLIO_CORE_ENABLE_BOOST_COROUTINES=ON `
            -DCLIO_CORE_ENABLE_RUNTIME=ON `
            -DCLIO_CORE_ENABLE_CTE=ON `
            -DCLIO_CORE_ENABLE_CAE=ON `
            -DCLIO_CORE_ENABLE_CEE=OFF `
            -DCLIO_CTE_ENABLE_FILESYSTEM=ON `
            -DCLIO_CORE_ENABLE_TESTS=ON `
            -DCLIO_CORE_ENABLE_PYTHON=OFF `
            -DCLIO_CORE_ENABLE_ZMQ=ON `
            -DCLIO_CORE_ENABLE_CEREAL=ON `
            -DCLIO_CORE_ENABLE_CONDA=OFF `
            -DCLIO_CORE_ENABLE_ELF=OFF `
            -DCLIO_CORE_ENABLE_RPATH=OFF `
            -DCLIO_CTE_ENABLE_VFD=OFF `
            -DCLIO_CTE_ENABLE_HDF5_VOL=OFF `
            -DCLIO_CORE_ENABLE_BENCHMARKS=OFF `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DCLIO_CTP_LOG_LEVEL=0
      - name: Build
        run: cmake --build build-boost --config Release -j $env:NUMBER_OF_PROCESSORS
      - name: Run tests
        run: ctest --test-dir build-boost --build-config Release --output-on-failure --timeout 180 --repeat until-pass:3 -LE ollama
