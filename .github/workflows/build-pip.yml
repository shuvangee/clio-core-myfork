name: Build, Test, and Publish Pip Wheels

on:
  workflow_dispatch:
  push:
    branches: main
    tags: ['v*']
  pull_request:
    branches: main

permissions:
  contents: write
  id-token: write

jobs:
  #------------------------------------------------------------
  # Guard: on a version tag, the git tag MUST match the version
  # in CMakeLists.txt (the single source of truth that
  # pyproject.toml derives the wheel version from). Without this,
  # a tag like v1.5.0 with a stale CMakeLists.txt version (1.0.3)
  # builds 1.0.3 wheels and PyPI publish silently no-ops via
  # skip-existing -> a "successful" release that publishes nothing.
  #------------------------------------------------------------
  check-version:
    name: Check tag matches version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify tag == CMakeLists.txt version
      run: |
        set -e
        TAG="${GITHUB_REF_NAME#v}"
        CMAKE_VERSION=$(grep -oP 'project\(iowarp-core VERSION \K[\d.]+' CMakeLists.txt)
        echo "Git tag version:        $TAG"
        echo "CMakeLists.txt version: $CMAKE_VERSION"
        if [ "$TAG" != "$CMAKE_VERSION" ]; then
          echo "::error::Tag '$GITHUB_REF_NAME' does not match CMakeLists.txt version '$CMAKE_VERSION'."
          echo "::error::Bump 'project(iowarp-core VERSION ...)' in CMakeLists.txt to $TAG and re-tag."
          exit 1
        fi
        echo "Version check passed."

  #------------------------------------------------------------
  # Build manylinux wheels via cibuildwheel
  #------------------------------------------------------------
  build-wheels:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            cibw_build: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64"
            cibw_image: manylinux_2_34
            cibw_environment: >-
              CMAKE_PREFIX_PATH=/usr/local
              PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib64/pkgconfig
              CFLAGS=-march=x86-64
              CXXFLAGS=-march=x86-64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            cibw_build: "cp310-manylinux_aarch64 cp311-manylinux_aarch64 cp312-manylinux_aarch64 cp313-manylinux_aarch64"
            cibw_image: manylinux_2_34
            cibw_environment: >-
              CMAKE_PREFIX_PATH=/usr/local
              PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib64/pkgconfig

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install cibuildwheel
      run: pip install cibuildwheel

    - name: Build wheels
      env:
        CIBW_BUILD: ${{ matrix.cibw_build }}
        CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.cibw_image }}
        CIBW_MANYLINUX_AARCH64_IMAGE: ${{ matrix.cibw_image }}
        CIBW_BEFORE_ALL: >
          yum install -y curl patchelf &&
          bash {project}/installers/pip/build_deps_manylinux.sh
        CIBW_ENVIRONMENT: ${{ matrix.cibw_environment }}
        CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
          bash {project}/installers/pip/repair_wheel.sh {dest_dir} {wheel}
        CIBW_TEST_COMMAND: >
          python -c "import iowarp_core; print('Version:', iowarp_core.get_version())"
      run: cibuildwheel --output-dir installers/pip/wheelhouse

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.arch }}
        path: installers/pip/wheelhouse/*.whl

  #------------------------------------------------------------
  # Build Windows wheels via cibuildwheel
  #------------------------------------------------------------
  build-wheels-windows:
    name: Build Windows wheels
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Bootstrap vcpkg
      run: |
        cd $env:VCPKG_INSTALLATION_ROOT
        git pull
        .\bootstrap-vcpkg.bat

    - name: Install vcpkg dependencies
      run: |
        C:/vcpkg/vcpkg install --triplet x64-windows zeromq yaml-cpp cereal msgpack-c

    - name: Install cibuildwheel
      run: pip install cibuildwheel

    - name: Build Windows wheels
      env:
        CIBW_BUILD: "cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64"
        CIBW_ENVIRONMENT_WINDOWS: >-
          CMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          VCPKG_DEFAULT_TRIPLET=x64-windows
          CLIO_CORE_ENABLE_PYTHON=ON
          CLIO_CORE_ENABLE_TESTS=OFF
          CLIO_CORE_ENABLE_BENCHMARKS=OFF
        CIBW_BUILD_FRONTEND: "build"
        CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10"
      run: cibuildwheel --output-dir installers/pip/wheelhouse

    - name: Upload Windows wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-win_amd64
        path: installers/pip/wheelhouse/*.whl

  #------------------------------------------------------------
  # Build macOS wheels via cibuildwheel
  #
  # Uses Homebrew for dependencies (cheaper and faster than building
  # them from source like manylinux). `liburing` is intentionally
  # omitted — it is Linux-only; macOS uses kqueue via the in-tree
  # EventManager polyfill. With CLIO_CORE_STATIC_DEPS=ON the wheel
  # statically links most C++ deps, so cibuildwheel's default
  # `delocate` handles the few remaining .dylibs without a custom
  # repair script.
  #------------------------------------------------------------
  build-wheels-macos:
    name: Build macOS wheels
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin to macos-14 (Apple Silicon, macOS 14 Sonoma host). macos-latest
          # is currently macos-15, where Homebrew bottles target macOS 15.0,
          # which forces every bundled dylib's minimum target to 15.0 and
          # makes the resulting wheel installable only on macOS 15+. macos-14
          # bottles target macOS 14.0, giving the wheel ~2.5 years of OS
          # compatibility (Sonoma, Sequoia, ...). The deployment target
          # below has to match so delocate accepts the bundle.
          - runner: macos-14
            arch: arm64
            cibw_build: "cp310-macosx_arm64 cp311-macosx_arm64 cp312-macosx_arm64 cp313-macosx_arm64"
            brew_prefix: /opt/homebrew
            macosx_deployment_target: '14.0'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build dependencies via Homebrew
      run: |
        # cppzmq is the C++ header wrapper for zeromq; cereal and cppzmq
        # are header-only. msgpack-c is the C library (the recipe uses
        # the C API in serialize/msgpack_wrapper.h).
        brew update
        brew install cmake pkg-config \
          yaml-cpp cereal msgpack-c libsodium zeromq cppzmq

    - name: Install cibuildwheel
      run: pip install cibuildwheel

    - name: Build macOS wheels
      env:
        CIBW_BUILD: ${{ matrix.cibw_build }}
        # MACOSX_DEPLOYMENT_TARGET must match (or exceed) the minimum
        # macOS target of every dylib bundled by delocate. Homebrew
        # bottles on the macos-14 runner are built for macOS 14.0, so
        # the wheel's deployment target has to be at least 14.0 — set
        # it for cibuildwheel (which propagates it into the build) AND
        # set it as an env var seen by the C++ compiler.
        MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
        # CMAKE_PREFIX_PATH / PKG_CONFIG_PATH point cmake and pkg-config
        # at Homebrew. SKBUILD_CMAKE_DEFINE overrides the pyproject.toml
        # default (CLIO_CORE_ENABLE_RPATH=OFF, which exists because the
        # Linux repair_wheel.sh rewrites RPATHs itself); we need it ON
        # so the built binaries carry `@rpath/libclio_*.dylib` references
        # that delocate can resolve against @loader_path/../lib and
        # bundle into the wheel.
        CIBW_ENVIRONMENT_MACOS: >-
          CMAKE_PREFIX_PATH=${{ matrix.brew_prefix }}
          PKG_CONFIG_PATH=${{ matrix.brew_prefix }}/lib/pkgconfig
          MACOSX_DEPLOYMENT_TARGET=${{ matrix.macosx_deployment_target }}
          SKBUILD_CMAKE_DEFINE='CLIO_CORE_ENABLE_RPATH=ON'
        CIBW_TEST_COMMAND: >
          python -c "import iowarp_core; print('Version:', iowarp_core.get_version())"
      run: cibuildwheel --output-dir installers/pip/wheelhouse

    - name: Upload macOS wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-macos-${{ matrix.arch }}
        path: installers/pip/wheelhouse/*.whl

  #------------------------------------------------------------
  # Test wheels in clean Docker containers
  #
  # Installs the wheel with nothing but Python + pip and verifies:
  #   - import succeeds (no missing symbols)
  #   - CLI binary runs
  #   - no unexpected shared library deps leaked
  #   - ldd shows all symbols resolved (no "not found")
  #------------------------------------------------------------
  test-wheels:
    needs: build-wheels
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 tests
          - runner: ubuntu-latest
            arch: x86_64
            distro: ubuntu:22.04
            pkg_manager: apt
          - runner: ubuntu-latest
            arch: x86_64
            distro: ubuntu:24.04
            pkg_manager: apt
          - runner: ubuntu-latest
            arch: x86_64
            distro: debian:12
            pkg_manager: apt
          - runner: ubuntu-latest
            arch: x86_64
            distro: fedora:40
            pkg_manager: dnf
          # aarch64 tests
          - runner: ubuntu-24.04-arm
            arch: aarch64
            distro: ubuntu:22.04
            pkg_manager: apt
          - runner: ubuntu-24.04-arm
            arch: aarch64
            distro: ubuntu:24.04
            pkg_manager: apt

    steps:
    - name: Checkout repository (for test script)
      uses: actions/checkout@v4
      with:
        sparse-checkout: installers/pip

    - name: Download wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-${{ matrix.arch }}
        path: wheels/

    - name: Test wheel in ${{ matrix.distro }}
      run: |
        docker run --rm \
          -v "$PWD/wheels:/wheels:ro" \
          ${{ matrix.distro }} \
          bash -c '
            set -e

            # Install Python
            if command -v apt-get &>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq python3 python3-pip python3-venv >/dev/null 2>&1
            elif command -v dnf &>/dev/null; then
              dnf install -y -q python3 python3-pip >/dev/null 2>&1
            fi

            # Create clean venv
            python3 -m venv /tmp/test-venv
            source /tmp/test-venv/bin/activate

            # Install the wheel matching this Python version
            # Use --find-links for the local wheel, but allow PyPI for dependencies
            pip install --quiet --find-links /wheels --no-cache-dir iowarp-core

            echo "=== Import test ==="
            python -c "import iowarp_core; print(\"Version:\", iowarp_core.get_version())"
            python -c "import iowarp_core; print(\"Lib dir:\", iowarp_core.get_lib_dir())"
            python -c "import iowarp_core; print(\"CTE available:\", iowarp_core.cte_available())"

            echo "=== CLI test ==="
            chimaera --help

            echo "=== Benchmark binaries: --help smoke test ==="
            # NOTE: This entire docker invocation is wrapped in bash -c
            # (single quotes), so comments here must not contain apostrophes
            # or they prematurely terminate the outer string and the
            # remaining commands run in the runner shell instead of docker.
            # See PR #430 followup for the original miss.
            #
            # Purpose: catch load-time crashes (missing NEEDED libs, ABI
            # mismatches, RPATH bugs from repair_wheel.sh) on benchmark
            # binaries that the import / ldd checks above do not exercise.
            # See issue #429 for the regression this guards against.
            #
            # clio_cte_bench prints --help via its logging framework at
            # ERROR level. clio_run_thrpt_bench prints to stdout and
            # exits 1. The point of this block is to fail the job on
            # SIGSEGV / exit >= 128, not on the benchmarks own --help
            # exit codes.
            for bench in clio_cte_bench clio_run_thrpt_bench; do
              echo "--- $bench --help ---"
              "$bench" --help || rc=$?
              rc=${rc:-0}
              if [ "$rc" -ge 128 ]; then
                echo "FAIL: $bench --help died with signal (exit $rc)"
                exit 1
              fi
              unset rc
            done

            echo "=== Symbol resolution check ==="
            LIB_DIR=$(python -c "import iowarp_core; print(iowarp_core.get_lib_dir())")
            export LD_LIBRARY_PATH="$LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
            MISSING=0
            for so in "$LIB_DIR"/*.so "$LIB_DIR"/*.so.*; do
              [ -f "$so" ] || continue
              if ldd "$so" 2>/dev/null | grep -q "not found"; then
                echo "FAIL: $(basename $so) has missing symbols:"
                ldd "$so" | grep "not found"
                MISSING=1
              fi
            done
            if [ "$MISSING" = "1" ]; then
              echo "ERROR: Some libraries have unresolved symbols"
              exit 1
            fi
            echo "All shared libraries resolve correctly"

            echo "=== Dependency audit ==="
            for so in "$LIB_DIR"/*.so; do
              [ -f "$so" ] || continue
              echo "--- $(basename $so) ---"
              ldd "$so" 2>/dev/null | grep -v "linux-vdso\|ld-linux\|libc.so\|libm.so\|libstdc++\|libgcc_s\|libpthread\|librt\|libdl" || true
            done

            echo "=== All tests passed ==="
          '

  #------------------------------------------------------------
  # Test macOS wheels natively (Docker is unavailable on GHA macOS).
  #
  # Same shape as the Linux Docker test job: pip install the wheel into
  # a clean venv, smoke-test the import and the CLI, and audit dylib
  # resolution with otool. Runs on the same arm64 runner that built the
  # wheel, which keeps the platform tag matching.
  #------------------------------------------------------------
  test-wheels-macos:
    needs: build-wheels-macos
    name: Test macOS wheels
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Same runner as the build so the wheel's macosx_14_0_arm64
          # platform tag is satisfied (the wheel is also installable on
          # macos-15+, but pinning here keeps test infra deterministic).
          - runner: macos-14
            arch: arm64
            python: '3.12'

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Download macOS wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-macos-${{ matrix.arch }}
        path: wheels/

    - name: Test wheel in clean venv
      run: |
        set -e
        python -m venv /tmp/test-venv
        source /tmp/test-venv/bin/activate

        pip install --quiet --find-links wheels --no-cache-dir iowarp-core

        echo "=== Import test ==="
        python -c "import iowarp_core; print('Version:', iowarp_core.get_version())"
        python -c "import iowarp_core; print('Lib dir:', iowarp_core.get_lib_dir())"
        python -c "import iowarp_core; print('CTE available:', iowarp_core.cte_available())"

        echo "=== CLI test ==="
        chimaera --help

        echo "=== Benchmark binaries: --help smoke test ==="
        # Catch SIGSEGV / abort at load time. Bench --help exit codes
        # are allowed to be non-zero; only signal-level deaths fail us.
        for bench in clio_cte_bench clio_run_thrpt_bench; do
          echo "--- $bench --help ---"
          "$bench" --help || rc=$?
          rc=${rc:-0}
          if [ "$rc" -ge 128 ]; then
            echo "FAIL: $bench --help died with signal (exit $rc)"
            exit 1
          fi
          unset rc
        done

        echo "=== Symbol resolution check (otool -L) ==="
        LIB_DIR=$(python -c "import iowarp_core; print(iowarp_core.get_lib_dir())")
        MISSING=0
        for dylib in "$LIB_DIR"/*.dylib; do
          [ -f "$dylib" ] || continue
          # Any line with "(compatibility ..." that resolves to a path
          # starting with @rpath/ without a corresponding @loader_path
          # would be suspect, but the more direct check is to actually
          # dlopen the lib. We use otool just to surface the deps.
          otool -L "$dylib" >/dev/null || MISSING=1
        done
        if [ "$MISSING" = "1" ]; then
          echo "ERROR: otool failed on a bundled dylib"
          exit 1
        fi
        echo "All bundled dylibs are well-formed"

        echo "=== All tests passed ==="

  #------------------------------------------------------------
  # Test Windows wheels natively (Linux Docker doesn't run on Windows
  # runners). v1.9.0 shipped a Windows wheel where `chimaera --help`
  # failed because chimaera.exe was missing from the wheel and the
  # Python CLI wrapper assumed LD_LIBRARY_PATH semantics — exactly the
  # class of thing this job is meant to catch. Same shape as the macOS
  # native test: pip install into a clean venv, run import + CLI +
  # benchmark smoke tests.
  #------------------------------------------------------------
  test-wheels-windows:
    needs: build-wheels-windows
    name: Test Windows wheels
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Download Windows wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-win_amd64
        path: wheels/

    - name: Test wheel in clean venv
      shell: pwsh
      run: |
        python -m venv $env:TEMP\test-venv
        & $env:TEMP\test-venv\Scripts\Activate.ps1

        pip install --quiet --find-links wheels --no-cache-dir iowarp-core
        if ($LASTEXITCODE -ne 0) { throw "pip install failed" }

        Write-Host "=== Import test ==="
        python -c "import iowarp_core; print('Version:', iowarp_core.get_version())"
        if ($LASTEXITCODE -ne 0) { throw "import failed" }
        python -c "import iowarp_core; print('Bin dir:', iowarp_core.get_bin_dir())"
        if ($LASTEXITCODE -ne 0) { throw "get_bin_dir failed" }
        python -c "import iowarp_core; print('CTE available:', iowarp_core.cte_available())"
        if ($LASTEXITCODE -ne 0) { throw "cte_available failed" }

        Write-Host "=== CLI test ==="
        chimaera --help
        # chimaera --help typically exits non-zero (printing usage),
        # which is fine. Only fail on missing-binary / DLL-load errors,
        # which surface as Windows error 0xC0000135 (-1073741515) or
        # similar load-time codes. Treat any negative exit code as a
        # crash; positive small codes are app-level "I printed usage".
        if ($LASTEXITCODE -lt 0 -or $LASTEXITCODE -gt 100) {
          throw "chimaera --help died with exit code $LASTEXITCODE (likely missing DLL or binary)"
        }

        Write-Host "=== Benchmark binaries: --help smoke test ==="
        foreach ($bench in @('clio_cte_bench', 'clio_run_thrpt_bench')) {
          Write-Host "--- $bench --help ---"
          & $bench --help
          if ($LASTEXITCODE -lt 0 -or $LASTEXITCODE -gt 100) {
            throw "$bench --help died with exit code $LASTEXITCODE"
          }
        }

        Write-Host "=== All Windows tests passed ==="

  #------------------------------------------------------------
  # Publish to PyPI on version tags
  #------------------------------------------------------------
  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - check-version
      - build-wheels
      - build-wheels-windows
      - build-wheels-macos
      - test-wheels
      - test-wheels-macos
      - test-wheels-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/iowarp-core
    permissions:
      id-token: write

    steps:
    - name: Download x86_64 wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-x86_64
        path: dist/

    - name: Download aarch64 wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-aarch64
        path: dist/

    - name: Download Windows wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-win_amd64
        path: dist/

    - name: Download macOS arm64 wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-macos-arm64
        path: dist/

    - name: List distributions
      run: ls -lh dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
        verbose: true

  #------------------------------------------------------------
  # Create GitHub Release on version tags
  #------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs:
      - check-version
      - build-wheels
      - build-wheels-windows
      - build-wheels-macos
      - test-wheels
      - test-wheels-macos
      - test-wheels-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download x86_64 wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-x86_64
        path: dist/

    - name: Download aarch64 wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-aarch64
        path: dist/

    - name: Download Windows wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-win_amd64
        path: dist/

    - name: Download macOS arm64 wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-macos-arm64
        path: dist/

    - name: List release artifacts
      run: ls -lh dist/

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        '${{ github.ref_name }}'
        --repo '${{ github.repository }}'
        --generate-notes
        dist/*
