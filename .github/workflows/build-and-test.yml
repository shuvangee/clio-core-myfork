name: Build and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            coverage: true
            site: ubu-24.amd64
            flags: amd64
          - os: ubuntu-24.04-arm
            coverage: true
            site: ubu-24.arm64
            flags: arm64
          - os: macos-14
            coverage: false
            site: ''
            flags: ''
          - os: macos-15
            coverage: false
            site: ''
            flags: ''
          - os: macos-15-intel
            coverage: false
            site: ''
            flags: ''
          - os: macos-26
            coverage: false
            site: ''
            flags: ''
          - os: macos-26-intel
            coverage: false
            site: ''
            flags: ''
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: recursive
        lfs: true          # pull the trained prediction models (Git LFS)
    - name: Install lcov (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y lcov
    - name: Install lcov (macOS)
      if: runner.os == 'macOS'
      run: brew install lcov
    - name: Build and test using install.sh
      run: |
        chmod +x install.sh
        ./install.sh
    - name: Calculate coverage
      if: matrix.coverage
      run: |
        # Activate conda from wherever install.sh set it up
        if [ -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]; then
          source "$HOME/miniconda3/etc/profile.d/conda.sh"
        elif [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ]; then
          source "$HOME/anaconda3/etc/profile.d/conda.sh"
        elif command -v conda &>/dev/null; then
          eval "$(conda shell.bash hook)"
        fi
        conda activate iowarp
        ./CI/calculate_coverage.sh --build --run-ctest --clean --site ${{ matrix.site }}
    # Drive-failure prediction end-to-end section. The contract test
    # (ctp_drive_prediction) already runs in the coverage ctest sweep above on
    # every OS; the prediction_e2e-labelled tests (the direct C++ E2E and the
    # full bdev->model integration) SKIP there because they need a live model
    # server. This Linux section stands that up: it installs the Python server
    # deps and re-runs the build/ tree's prediction_e2e tests for real, against
    # the Git-LFS models pulled at checkout.
    - name: Drive-failure prediction E2E (Linux)
      if: matrix.coverage
      run: |
        python3 -m venv "$HOME/predenv"
        "$HOME/predenv/bin/pip" install --quiet --upgrade pip
        "$HOME/predenv/bin/pip" install --quiet -r prediction_server/requirements.txt
        cd build
        PREDICT_PYTHON="$HOME/predenv/bin/python" \
          ctest -L prediction_e2e --output-on-failure
    - name: Upload coverage to Codecov
      if: matrix.coverage && always()
      uses: codecov/codecov-action@v5
      with:
        files: build/coverage_filtered.info
        flags: ${{ matrix.flags }}
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: iowarp/clio-core
