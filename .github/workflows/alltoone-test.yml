name: AllToOne Test

# Docker-based CI for the PoolQuery::AllToOne collective barrier. Unlike
# ManyToOne (a time-windowed batch that runs on a single node), AllToOne holds
# the aggregate until tasks from EVERY container in the pool have arrived, so it
# is exercised on a real multi-node cluster: a client issues one AllToOne
# AllocateBlocks request per node; the neighborhood leader's BatchManager counts
# arrivals and only flushes (runs the aggregate once + broadcasts the result
# back 1->N) when the count reaches the pool's container count.
#
# The project is compiled ONCE inside the iowarp/deps-cpu image (ABI-matched to
# the runtime node containers, which load the .so files from the mounted build
# directory), then the 4-node cluster runs that single build.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'context-runtime/**'
      - 'context-transfer-engine/**'
      - 'context-transport-primitives/**'
      - 'docker/deps-cpu.Dockerfile'
      - '.github/workflows/alltoone-test.yml'
  workflow_dispatch:

concurrency:
  group: alltoone-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alltoone:
    name: AllToOne (4-node docker, collective barrier)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DEPS_IMAGE: iowarp/deps-cpu:latest
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # Authenticated pulls avoid Docker Hub's anonymous rate limit. Skipped
      # automatically on forked-PR runs where the secret is unavailable.
      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Pull dependency image
        run: docker pull "$DEPS_IMAGE"

      # Build inside the deps-cpu image so the resulting binaries link against
      # the same libraries the runtime node containers provide at runtime.
      - name: Build (inside deps-cpu)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace -w /workspace -u 0 \
            -e HOST_UID="$(id -u)" -e HOST_GID="$(id -g)" \
            "$DEPS_IMAGE" bash -c '
              set -e
              export LD_LIBRARY_PATH=/usr/local/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
              export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
              git config --global --add safe.directory /workspace
              cmake --preset release -DCLIO_CORE_ENABLE_PYTHON=OFF
              cmake --build build -j"$(nproc)"
              # Hand ownership back to the runner so post-job cleanup and the
              # test cluster (which runs as the runner uid) can access build/.
              chown -R "$HOST_UID:$HOST_GID" build
            '

      - name: Run AllToOne barrier test (4-node cluster)
        run: |
          export HOST_UID="$(id -u)" HOST_GID="$(id -g)"
          ./context-runtime/test/integration/alltoone/run_tests.sh all

      # The run_tests.sh script tears the cluster down on success and failure;
      # this only fires if the step was killed before its own cleanup.
      - name: Cleanup cluster
        if: always()
        run: |
          docker compose -f context-runtime/test/integration/alltoone/docker-compose.yml down -v || true
