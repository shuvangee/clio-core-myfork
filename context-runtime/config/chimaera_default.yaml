# =============================================================================
# IOWarp Default Configuration
# =============================================================================
# Canonical reference for all configurable parameters across:
#   - Chimaera Runtime (context-runtime)
#   - Context Transfer Engine / CTE (context-transfer-engine)
#   - Context Assimilation Engine / CAE (context-assimilation-engine)
#
# Config lookup order (canonical first; legacy paths kept for back-compat):
#   1. $CLIO_SERVER_CONF (or legacy $CHI_SERVER_CONF) environment variable
#   2. ~/.clio/clio.yaml
#   3. ~/.clio/chimaera.yaml
#   4. ~/.chimaera/clio.yaml
#   5. ~/.chimaera/chimaera.yaml         (legacy)
#
# Size values accept: B, KB, MB, GB, TB (case-insensitive)
# =============================================================================

# -- Networking ---------------------------------------------------------------
networking:
  port: 9413                           # RPC listener port
  neighborhood_size: 32                # Max nodes queried when splitting range queries
  # hostfile: "/path/to/hostfile"      # One hostname per line for distributed mode
  wait_for_restart: 30                 # Seconds to wait for peer nodes on startup
  wait_for_restart_poll_period: 1      # Seconds between connection retries

# -- Logging ------------------------------------------------------------------
# Logging is controlled by environment variables, not this file.
#   CTP_LOG_LEVEL : debug, info, success, warning, error, fatal (default: info)
#   CTP_LOG_OUT   : path to a log file (default: console only)

# -- Runtime ------------------------------------------------------------------
runtime:
  num_threads: 4                       # Worker threads for task execution
  queue_depth: 1024                    # Task queue depth per worker
  local_sched: "default"               # Local task scheduler algorithm
  first_busy_wait: 10000               # Microseconds to busy-wait before sleeping (10ms)
  learning_rate: 0.2                   # SGD learning rate for task load prediction model

# -- Compose ------------------------------------------------------------------
# Modules started automatically with the runtime.
#
# Default layout matches the canonical pool-id constants in the source:
# CTE core (clio_cte_core) sits at pool 512.0 — the address every CTE
# client targets via clio::cte::core::kCtePoolId — and CAE
# (clio_cae_core) sits at its own pool 400.0 (clio::cae::core::kCaePoolId)
# with next_pool_id pointing at CTE. CAE is the assimilation / discovery
# entrypoint (CEE -> ParseOmni) and forwards the data path it owns
# (GetOrCreateTag / PutBlob / GetBlob / SemanticSearch) on to CTE.
#
# NOTE: do NOT put CAE in front of CTE at 512.0. CAE only mirrors the
# four data-path method ids above; the rest of its method ids collide
# with CTE's (e.g. CAE kParseOmni == CTE kRegisterTarget == 10), so a
# CTE client hitting CAE for RegisterTarget / TagQuery / BlobQuery is
# dispatched to the wrong handler and crashes. Transparent CTE-client
# interception therefore lives only in the dedicated interceptor test
# configs, never in this default.
#
# Only clio_bdev is strictly required. Drop the CAE or CTE entry if you
# don't need it.
compose:

  # === Block Device (DRAM) ===
  # Required: provides the shared memory allocator used by other modules.
  - mod_name: clio_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram                       # Options: file, ram, hbm, pinned, noop
    capacity: "0g"                       # 0/0g = default to 80% of total system DRAM

  # === Block Device (File) ===
  # Uncomment to add a file-backed block device (e.g., for NVMe or HDD storage).
  # - mod_name: clio_bdev
  #   pool_name: "/mnt/nvme/chi_bdev"
  #   pool_query: local
  #   pool_id: "302.0"
  #   bdev_type: file                    # Options: file, ram, hbm, pinned, noop
  #   capacity: "100GB"

  # === Context Assimilation Engine (CAE) ===
  # Assimilation / discovery entrypoint at its own pool 400.0
  # (clio::cae::core::kCaePoolId). CEE calls ParseOmni here; CAE forwards
  # the data-path tasks it owns to the CTE core at next_pool_id (512.0).
  - mod_name: clio_cae_core
    pool_name: cae_main
    pool_query: local
    pool_id: "400.0"
    next_pool_id: "512.0"               # CTE core pool — see entry below

    # Transparent LLM labeling — optional. When enabled, PutBlob calls
    # `model` on `label_endpoint` for every blob whose tag+name matches
    # a rule, and stores the response as `{blob_name}_label` in the
    # same tag. Leave commented out for a pure-passthrough CAE.
    #
    # label_endpoint: "http://127.0.0.1:11434"   # Ollama-compatible server
    # label_prompts:
    #   summarize: "Summarize the following text in one short sentence."
    # label_matches:
    #   - tag_re: ".*\\.txt$"                    # only label .txt blobs
    #     blob_re: ".*"
    #     model: "gemma3:1b"
    #     prompt: "summarize"
    #     context_length: 4096                  # tokens (Ollama num_ctx)

  # === Context Transfer Engine (CTE) ===
  # High-performance data buffering and transfer engine. Sits at the
  # canonical CTE entrypoint 512.0 (clio::cte::core::kCtePoolId) so every
  # CTE client / FUSE adapter resolves to it directly. Remove this (and
  # the CAE entry above) if you do not need CTE.
  - mod_name: clio_cte_core
    pool_name: cte_main
    pool_query: local
    pool_id: "512.0"

    # Storage tiers ---------------------------------------------------------
    # Each entry creates a block device for CTE to buffer data onto.
    # score: 0.0 = slowest/cheapest, 1.0 = fastest/most expensive
    #        -1.0 = automatic scoring
    storage:
      - path: "ram::cte_ram_tier1"       # "ram::<name>" for DRAM, filesystem path for disk
        bdev_type: "ram"                 # Options: file, ram, hbm, pinned, noop
        capacity_limit: "0g"             # 0/0g = default to 80% of total system DRAM
        score: 1.0                       # DRAM = highest-performance tier

    # Data Placement Engine ------------------------------------------------
    dpe:
      dpe_type: "max_bw"                # "max_bw", "round_robin", or "random"

    # Target management ----------------------------------------------------
    targets:
      neighborhood: 1                   # Storage nodes CTE can buffer to
      default_target_timeout_ms: 30000   # Timeout for target operations (ms)
      poll_period_ms: 5000               # Target statistics re-scan interval (ms)

    # Performance tuning ---------------------------------------------------
    # Uncomment to override defaults:
    # performance:
    #   stat_targets_period_ms: 50       # Periodic StatTargets interval (ms)
    #   max_concurrent_operations: 64    # Max concurrent I/O operations
    #   score_threshold: 0.7             # Score above which blobs are reorganized
    #   score_difference_threshold: 0.05 # Min score delta to trigger reorganization
    #   flush_metadata_period_ms: 5000   # Metadata flush interval (ms)
    #   flush_data_period_ms: 10000      # Data flush interval (ms)
    #   flush_data_min_persistence: 1    # Min persistence level (1=temp-nonvolatile)
    #   transaction_log_capacity: "32MB" # Write-ahead log capacity
