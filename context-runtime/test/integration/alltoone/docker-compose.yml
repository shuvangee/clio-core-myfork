# Distributed Integration Tests for Clio Runtime
# Uses deps-cpu container with mounted build directory for coverage support
#
# Usage:
#   # Standard run
#   docker compose up
#
#   # With custom workspace path (for devcontainers)
#   HOST_WORKSPACE=/host/path/to/workspace docker compose up
#
# Coverage: gcda files are written directly to the mounted build directory,
# allowing coverage data to be collected after test execution.

services:
  # Node 1 - Test coordinator that runs the test binary
  iowarp-node1:
    image: ${IOWARP_DOCKER_IMAGE:-iowarp/deps-cpu:latest}
    init: true
    stop_grace_period: 5s
    security_opt:
      - seccomp:unconfined
    container_name: iowarp-alltoone-node1
    hostname: iowarp-node1
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      iowarp-cluster:
        ipv4_address: 172.28.0.10
    volumes:
      # Mount the entire workspace for coverage support
      - ${HOST_WORKSPACE:-${IOWARP_CORE_ROOT:-/workspace}}:/workspace:rw
    environment:
      - NODE_ID=1
      - NODE_IP=172.28.0.10
      - CLIO_SERVER_CONF=/workspace/context-runtime/test/integration/alltoone/clio_conf.yaml
      - CONTAINER_HOSTFILE=/workspace/context-runtime/test/integration/alltoone/hostfile
      - CLIO_WITH_RUNTIME=0
      - CLIO_NUM_CONTAINERS=4
      - PATH=/workspace/build/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/workspace/build/bin:/usr/local/cuda/lib64:/usr/local/lib
    mem_limit: 16g
    working_dir: /workspace
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      "
        echo 'Node 1: Starting runtime...' &&
        /workspace/build/bin/clio_run runtime start &
        RUNTIME_PID=\$! &&
        echo 'Node 1: Runtime started (PID \$RUNTIME_PID). Waiting for test runner...' &&
        wait \$RUNTIME_PID
      "

  # Node 2
  iowarp-node2:
    image: ${IOWARP_DOCKER_IMAGE:-iowarp/deps-cpu:latest}
    init: true
    stop_grace_period: 5s
    security_opt:
      - seccomp:unconfined
    container_name: iowarp-alltoone-node2
    hostname: iowarp-node2
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      iowarp-cluster:
        ipv4_address: 172.28.0.11
    volumes:
      - ${HOST_WORKSPACE:-${IOWARP_CORE_ROOT:-/workspace}}:/workspace:rw
    environment:
      - NODE_ID=2
      - NODE_IP=172.28.0.11
      - CLIO_SERVER_CONF=/workspace/context-runtime/test/integration/alltoone/clio_conf.yaml
      - CONTAINER_HOSTFILE=/workspace/context-runtime/test/integration/alltoone/hostfile
      - CLIO_WITH_RUNTIME=0
      - CLIO_NUM_CONTAINERS=4
      - PATH=/workspace/build/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/workspace/build/bin:/usr/local/cuda/lib64:/usr/local/lib
    mem_limit: 16g
    working_dir: /workspace
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      "
        echo 'Node 2: Starting runtime...' &&
        /workspace/build/bin/clio_run runtime start
      "

  # Node 3
  iowarp-node3:
    image: ${IOWARP_DOCKER_IMAGE:-iowarp/deps-cpu:latest}
    init: true
    stop_grace_period: 5s
    security_opt:
      - seccomp:unconfined
    container_name: iowarp-alltoone-node3
    hostname: iowarp-node3
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      iowarp-cluster:
        ipv4_address: 172.28.0.12
    volumes:
      - ${HOST_WORKSPACE:-${IOWARP_CORE_ROOT:-/workspace}}:/workspace:rw
    environment:
      - NODE_ID=3
      - NODE_IP=172.28.0.12
      - CLIO_SERVER_CONF=/workspace/context-runtime/test/integration/alltoone/clio_conf.yaml
      - CONTAINER_HOSTFILE=/workspace/context-runtime/test/integration/alltoone/hostfile
      - CLIO_WITH_RUNTIME=0
      - CLIO_NUM_CONTAINERS=4
      - PATH=/workspace/build/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/workspace/build/bin:/usr/local/cuda/lib64:/usr/local/lib
    mem_limit: 16g
    working_dir: /workspace
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      "
        echo 'Node 3: Starting runtime...' &&
        /workspace/build/bin/clio_run runtime start
      "

  # Node 4
  iowarp-node4:
    image: ${IOWARP_DOCKER_IMAGE:-iowarp/deps-cpu:latest}
    init: true
    stop_grace_period: 5s
    security_opt:
      - seccomp:unconfined
    container_name: iowarp-alltoone-node4
    hostname: iowarp-node4
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      iowarp-cluster:
        ipv4_address: 172.28.0.13
    volumes:
      - ${HOST_WORKSPACE:-${IOWARP_CORE_ROOT:-/workspace}}:/workspace:rw
    environment:
      - NODE_ID=4
      - NODE_IP=172.28.0.13
      - CLIO_SERVER_CONF=/workspace/context-runtime/test/integration/alltoone/clio_conf.yaml
      - CONTAINER_HOSTFILE=/workspace/context-runtime/test/integration/alltoone/hostfile
      - CLIO_WITH_RUNTIME=0
      - CLIO_NUM_CONTAINERS=4
      - PATH=/workspace/build/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/workspace/build/bin:/usr/local/cuda/lib64:/usr/local/lib
    mem_limit: 16g
    working_dir: /workspace
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      "
        echo 'Node 4: Starting runtime...' &&
        /workspace/build/bin/clio_run runtime start
      "

networks:
  iowarp-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
