# Clio Configuration for Reconnect Integration Testing
# 4-node cluster testing client failover to new hosts after server death

# Network configuration
networking:
  port: 9413
  neighborhood_size: 4
  hostfile: "/workspace/context-runtime/test/integration/reconnect/hostfile"

# Logging configuration
logging:
  level: "info"
  file: "/tmp/clio.log"

# Runtime configuration
runtime:
  num_threads: 8
  queue_depth: 1024
  local_sched: "default"
  first_busy_wait: 50

# Fast SWIM failure detection for the test (production defaults are 30/15/60s,
# which would take ~150s to confirm a dead node — longer than the scenario).
swim:
  enabled: true
  direct_probe_timeout_sec: 2.0
  indirect_probe_timeout_sec: 2.0
  suspicion_timeout_sec: 3.0
