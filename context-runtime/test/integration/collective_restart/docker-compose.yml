# Collective-restart reproducer cluster (issue #628).
# 4 nodes. The repo is mounted at /workspace and the runtime is run from
# /workspace/build/bin, i.e. the host build tree (as in the other integration
# tests). For local iteration against a build held in a docker volume, drop a
# docker-compose.override.yml that mounts it at /workspace/build.

x-node-common: &node-common
  image: ${IOWARP_DOCKER_IMAGE:-iowarp/deps-nvidia:latest}
  security_opt:
    - seccomp:unconfined
  user: "0:0"
  volumes:
    - ${HOST_WORKSPACE:-${IOWARP_CORE_ROOT:-/workspace}}:/workspace:rw
  working_dir: /workspace
  mem_limit: 16g
  entrypoint: ["/workspace/build/bin/clio_run"]
  command: ["start"]

x-node-env: &node-env
  CLIO_SERVER_CONF: /workspace/context-runtime/test/integration/collective_restart/clio_conf.yaml
  CONTAINER_HOSTFILE: /workspace/context-runtime/test/integration/collective_restart/hostfile
  CLIO_WITH_RUNTIME: "0"
  CLIO_NUM_CONTAINERS: "4"
  PATH: /workspace/build/bin:/usr/local/bin:/usr/bin:/bin
  LD_LIBRARY_PATH: /workspace/build/bin:/usr/local/cuda/lib64:/usr/local/lib

services:
  iowarp-node1:
    <<: *node-common
    container_name: iowarp-crestart-node1
    hostname: iowarp-node1
    networks:
      iowarp-crestart-cluster:
        ipv4_address: 172.28.0.10
    environment:
      <<: *node-env
      NODE_ID: "1"
      NODE_IP: 172.28.0.10

  iowarp-node2:
    <<: *node-common
    container_name: iowarp-crestart-node2
    hostname: iowarp-node2
    networks:
      iowarp-crestart-cluster:
        ipv4_address: 172.28.0.11
    environment:
      <<: *node-env
      NODE_ID: "2"
      NODE_IP: 172.28.0.11

  iowarp-node3:
    <<: *node-common
    container_name: iowarp-crestart-node3
    hostname: iowarp-node3
    networks:
      iowarp-crestart-cluster:
        ipv4_address: 172.28.0.12
    environment:
      <<: *node-env
      NODE_ID: "3"
      NODE_IP: 172.28.0.12

  iowarp-node4:
    <<: *node-common
    container_name: iowarp-crestart-node4
    hostname: iowarp-node4
    networks:
      iowarp-crestart-cluster:
        ipv4_address: 172.28.0.13
    environment:
      <<: *node-env
      NODE_ID: "4"
      NODE_IP: 172.28.0.13

networks:
  iowarp-crestart-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
