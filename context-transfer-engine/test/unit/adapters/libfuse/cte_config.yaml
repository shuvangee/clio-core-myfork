# CTE Configuration for FUSE adapter copy-workspace test
# RAM-only storage — sized to hold /workspace source files
compose:
  - mod_name: clio_cte_core
    pool_name: clio_cte
    pool_query: local
    pool_id: 512.0

    targets:
      neighborhood: 1
      default_target_timeout_ms: 30000
      poll_period_ms: 5000

    storage:
      - path: "ram::cte_fuse_ram"
        bdev_type: "ram"
        capacity_limit: "16GB"
        score: 0.0

    dpe:
      dpe_type: "max_bw"
