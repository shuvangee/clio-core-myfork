# Compose configuration for CAE → CTE interceptor integration test.
# The CAE core sits at the CTE entrypoint (512.0) and forwards
# GetOrCreateTag / PutBlob / GetBlob to the real CTE core at 513.0.

networking:
  port: 9413

runtime:
  num_threads: 4
  queue_depth: 1024

compose:
  # Default bdev pool (RAM tier) — matches the compose layout used by the
  # compressor transparent-compress test so the runtime has a default
  # block device to fall back on.
  - mod_name: clio_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "256MB"

  # CAE core at the entrypoint (512.0)
  - mod_name: clio_cae_core
    pool_name: cae_interceptor
    pool_query: local
    pool_id: "512.0"
    next_pool_id: "513.0"

  # CTE core behind the CAE (513.0)
  - mod_name: clio_cte_core
    pool_name: cte_core
    pool_query: local
    pool_id: "513.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "128MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
