# Compose configuration for CAE transparent labeling integration test.
# CAE sits at the CTE entrypoint (512.0) with next_pool_id=513.0 (CTE
# core). When a PutBlob's tag+blob name matches a label_matches entry,
# the CAE handler calls the local Ollama instance and stores the
# returned label as `{blob_name}_label` in the same tag.

networking:
  port: 9413

runtime:
  num_threads: 4
  queue_depth: 1024

compose:
  # Default bdev fallback tier.
  - mod_name: clio_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "256MB"

  # CAE at the CTE entrypoint with labeling enabled.
  - mod_name: clio_cae_core
    pool_name: cae_labeler
    pool_query: local
    pool_id: "512.0"
    next_pool_id: "513.0"
    label_endpoint: "http://127.0.0.1:11434"
    label_prompts:
      summarize: "Summarize the following text in one short sentence."
    label_matches:
      # Rule 1: small ".txt" blobs — comfortable single-shot context.
      - tag_re: ".*\\.txt$"
        blob_re: ".*"
        model: "gemma3:1b"
        prompt: "summarize"
        context_length: 4096
      # Rule 2: ".chunked" tag — deliberately tiny context_length so any
      # non-trivial blob hits the chunk-and-concatenate path in
      # CAE::PutBlob. Exercised by test_cae_labeling's chunking test.
      - tag_re: ".*\\.chunked$"
        blob_re: ".*"
        model: "gemma3:1b"
        prompt: "summarize"
        context_length: 512

  # CTE core behind the CAE.
  - mod_name: clio_cte_core
    pool_name: cte_core
    pool_query: local
    pool_id: "513.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "128MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
