# Compose configuration for the CAE labeling + CTE semantic-search test.
# Same shape as the labeling test: CAE intercepts at 512.0 with one
# labeling rule that fires on every blob; CTE backs it at 513.0 and
# owns the BM25 search.

networking:
  port: 9413

runtime:
  num_threads: 4
  queue_depth: 1024

compose:
  - mod_name: clio_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "256MB"

  - mod_name: clio_cae_core
    pool_name: cae_main
    pool_query: local
    pool_id: "512.0"
    next_pool_id: "513.0"
    label_endpoint: "http://127.0.0.1:11434"
    label_prompts:
      summarize: "Summarize the following text in one short sentence."
    label_matches:
      - tag_re: ".*"
        blob_re: "^doc[0-9]+$"
        model: "gemma3:1b"
        prompt: "summarize"
        context_length: 4096
        num_predict: 64

  - mod_name: clio_cte_core
    pool_name: cte_core
    pool_query: local
    pool_id: "513.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "128MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
