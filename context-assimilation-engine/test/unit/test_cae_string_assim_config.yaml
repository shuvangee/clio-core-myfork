# Compose config for the StringDataAssimilator test. CAE at its default
# peer pool (400.0) calls into CTE at the default 512.0 — no interceptor
# layout because string-data assimilation is a pure CAE operation that
# uses CTE only to PutBlob the payload.

networking:
  port: 9413

runtime:
  num_threads: 4
  queue_depth: 1024

compose:
  - mod_name: clio_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "64MB"

  - mod_name: clio_cae_core
    pool_name: cae_main
    pool_query: local
    pool_id: "400.0"

  - mod_name: clio_cte_core
    pool_name: cte_core
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "32MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
