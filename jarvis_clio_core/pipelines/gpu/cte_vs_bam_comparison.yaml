# CTE vs BaM GPU Benchmark Comparison
#
# Compares IOWarp CTE against BaM across all workloads and modes:
#
# Workloads:
#   synthetic    -- Pure I/O (put+get round-trip)
#   pagerank     -- Graph analytics (edge-centric push)
#   gnn          -- GNN neighbor feature gather
#   gray_scott   -- 3D stencil simulation with checkpoint I/O
#   llm_kvcache  -- LLM KV cache offload/restore
#
# Modes (workload_mode):
#   cte    -- CTE AsyncPutBlob/AsyncGetBlob (GPU-local)
#   bam    -- BaM warp-cooperative page cache (GIDS-style)
#
# Storage targets (--target type:size):
#   hbm:256m   -- 256 MB in GPU HBM
#   pinned:256m -- 256 MB in pinned host memory
#
# Fixed: client_blocks=64, rt_blocks=16
#
# Requirements:
#   - clio_cte_gpu_bench in PATH (built with -DWRP_CORE_ENABLE_BAM=ON)
#   - CUDA-capable GPU
#
# Usage:
#   jarvis pipeline test gpu/cte_vs_bam_comparison.yaml

config:
  name: cte_vs_bam
  pkgs:
    - pkg_type: jarvis_clio_core.clio_cte_gpu_bench
      pkg_name: bench
      test_case: "synthetic"
      workload_mode: "cte"
      routing: "local"
      client_blocks: 64
      client_threads: 32
      rt_blocks: 16
      rt_threads: 32
      io_size: "128k"
      iterations: 64
      timeout: 120
      targets:
        - ["hbm", "256m"]
        - ["pinned", "256m"]

vars:
  # --- Workloads ---
  bench.test_case:
    # - "synthetic"
    # - "pagerank"
    # - "gnn"
    # - "gray_scott"
    - "llm_kvcache"

  # --- Modes: CTE (Local), CTE (ToLocalCpu), BaM ---
  bench.workload_mode: ["cte",   "cte",    "bam"]
  bench.routing:       ["local", "to_cpu", "local"]

  # --- I/O sizes (with iterations scaled to keep total work reasonable) ---
  bench.io_size:    ["16k",  "128k", "16m"]
  bench.iterations: [256,    64,     64   ]

loop:
  - [bench.test_case]
  - [bench.workload_mode, bench.routing]
  - [bench.io_size, bench.iterations]

repeat: 1
output: "${HOME}/cte_vs_bam_results"
