# Pipeline: BioExcel MD Setup workload running inside the prebuilt
# biobb_wf_md_setup_apptainer_test SIF, with IOWarp's FUSE adapter
# providing the CTE-backed mount that the workload writes to.
#
# Stack (single host):
#   clio_runtime     — chimaera daemon on the host
#   clio_cte         — CTE storage tier (8GB RAM)
#   clio_cte_libfuse — clio_cte_fuse binary (host PATH) mounts $HOME/clio_cte
#   biobb_wf_md_setup — runs INSIDE the existing apptainer SIF; its
#                       /mnt/clio_cte path is bound from $HOME/clio_cte on
#                       the host, so workload writes land on the FUSE
#                       adapter and flow through clio_cte → clio_runtime.
#
# `container_image` reuses the SIF built by
# builtin/pipelines/examples/biobb_wf_md_setup_apptainer_test.yaml — this
# pipeline never re-runs apptainer build. Verified by leaving the file
# under $SHARED_DIR/containers untouched on each run.

name: biobb_iowarp_libfuse_1n

install_manager: container
container_engine: apptainer
container_image: biobb_wf_md_setup_apptainer_test

container_binds:
  - /home/llogan/clio_cte:/mnt/clio_cte
  - /home/llogan/clio_cte:/home/llogan/clio_cte

pkgs:
  - pkg_type: jarvis_clio_core.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: tcp
    log_level: info
    sleep: 4

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "8GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none

  - pkg_type: jarvis_clio_core.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: /home/llogan/clio_cte
    sleep: 2

  - pkg_type: builtin.biobb_wf_md_setup
    pkg_name: biobb
    nprocs: 1
    ppn: 1
    out: /home/llogan/clio_cte/biobb_iowarp_libfuse_1n
