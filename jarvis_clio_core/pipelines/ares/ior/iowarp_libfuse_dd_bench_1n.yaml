# Pipeline: dd benchmark through clio_cte_libfuse with the chimaera
# runtime embedded in the FUSE process (CHI_WITH_RUNTIME=1).
#
# No clio_runtime package -- clio_cte_fuse owns the runtime. The pool is
# composed by clio_cte (deploy_mode default) which connects via SHM to
# clio_cte_fuse's embedded runtime.
#
# Runs bare-metal on host; no container needed for the bench itself.

name: iowarp_libfuse_dd_bench_1n

install_manager: native

pkgs:
  - pkg_type: jarvis_clio_core.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: /home/llogan/clio_cte
    embedded_runtime: true
    sleep: 4

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "16GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
