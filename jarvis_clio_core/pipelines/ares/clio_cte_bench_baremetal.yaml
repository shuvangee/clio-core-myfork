# clio_cte_bench on ares baremetal — single node, SHM transport, RAM bdev.
#
# Purpose: measure raw CTE PutBlob bandwidth, isolated from the POSIX
# adapter and IOR. Numbers from this run set the ceiling we can expect
# from the adapter path.
#
# Workload: 1 rank x 1 thread x depth=8 async x 4096 ops of 1 MiB
#   = 4 GiB total, with 8 PutBlobs in flight per thread.

name: clio_cte_bench_baremetal

pkgs:
  - pkg_type: jarvis_clio_core.clio_runtime
    pkg_name: cte_runtime
    num_threads: 4
    client_data_segment_size: "2G"
    ipc_mode: shm
    log_level: info
    sleep: 2

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte
    devices:
      - ["ram::cte_ram", "16G", 1.0]
    dpe_type: max_bw
    neighborhood: 1

  - pkg_type: jarvis_clio_core.clio_cte_bench
    pkg_name: bench
    test_case: Put
    num_threads: 1
    depth: 8
    io_size: "1m"
    io_count: 4096
    nprocs: 1
    ppn: 1
    init_runtime: false
