# Montage benchmark - CTE-FUSE variant.
#
# Real montage pipeline inside the montage_apptainer_test SIF, with
# the IOWarp libfuse adapter mounted at /mnt/clio_cte and backed by a
# 35 GiB RAM bdev in the chimaera runtime. Output `cp` into
# /mnt/clio_cte/montage_cte_fuse_big exercises the FUSE adapter under
# real FITS payloads.
#
# Comparison: montage_nfs_big.yaml runs the same workload with output
# going directly to NFS. Wall-clock delta between the two isolates
# the CTE-FUSE I/O path.
#
# Notes:
#   - clio_cte_libfuse handles open/write/close. Rename is unsupported,
#     so Montage intermediates (which use atomic-write-then-rename)
#     stay on a host-bound scratch dir; only the final cp staging
#     phase hits the FUSE mountpoint.
#   - 35 GB bdev sized for a ~1.5° M17 mosaic. Bump if you go larger.

name: montage_cte_fuse_big

# Strip LD_LIBRARY_PATH before invoking ssh so the host /usr/bin/ssh
# uses the system libcrypto.so.3 (built against OpenSSL 3.0.x) rather
# than the conda env's libcrypto (3.6.x), which would otherwise trigger
# "OpenSSL version mismatch" and abort ssh. Only affects multi-node
# deployments — local-only pipelines skip ssh entirely.
ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

install_manager: container
container_engine: apptainer
container_image: montage_apptainer_test

container_binds:
  - ${HOME}/run_mosaic_big.sh:/opt/run_mosaic.sh:ro
  - ${HOME}/clio_cte:/mnt/clio_cte
  - ${HOME}/clio_cte:${HOME}/clio_cte
  - ${HOME}/montage-scratch-cte:${HOME}/montage-scratch-cte

pkgs:
  - pkg_type: jarvis_clio_core.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    # Heap corruption diagnostic: restore num_threads=4 and pin the
    # race to either libfuse (multi-threaded by default) or chimaera
    # (by adding -s below to make libfuse single-threaded).
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram", "35GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none

  - pkg_type: jarvis_clio_core.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte
    # clio_cte_fuse now forces -s (single-threaded libfuse) at the
    # binary level. Override at runtime with CLIO_CTE_FUSE_ALLOW_MT=1
    # once the underlying race is debugged and fixed.
    sleep: 2

  - pkg_type: builtin.montage
    pkg_name: montage
    nprocs: 1
    ppn: 1
    region: M17
    band: j
    size: 1.5
    scratch_dir: ${HOME}/montage-scratch-cte
    out: /mnt/clio_cte/montage_cte_fuse_big
