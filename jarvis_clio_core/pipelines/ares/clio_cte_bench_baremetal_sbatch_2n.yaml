# clio_cte_bench on ares baremetal -- 2-node SLURM, SHM transport, RAM bdev.
#
# Purpose: bypass the FUSE adapter entirely. Each node runs a clio_cte_bench
# process that issues PutBlob calls straight into its LOCAL chimaera
# daemon. If this passes, we know the 2-node chimaera + CTE path is
# healthy and the FUSE adapter is the lone bug (file size returns 0,
# read-after-write fails for ior). If this fails, the bug is below FUSE.
#
# Usage:
#   jarvis ppl submit \
#     ${IOWARP}/jarvis_clio_core/pipelines/ares/clio_cte_bench_baremetal_sbatch_2n.yaml

name: clio_cte_bench_baremetal_sbatch_2n

# Pssh-to-localhost route -- the conda libcrypto.so.3 (ABI 3.0.x) shadows
# the system libcrypto (ABI 3.6.x) that /usr/bin/ssh was built against.
# Strip the conda LD_LIBRARY_PATH only for the ssh hop so the binary
# launcher can still find its own libs.
ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

# OpenMPI peer-wireup -- harmless here (clio_cte_bench isn't MPI) but the
# pre_cmds load openmpi so jarvis's captured env is consistent with the
# IOR pipeline. Pin both fabrics to 172.20.0.0/16 (eno1) which is what
# `getent hosts ares-comp-XX` resolves to.
env:
  OMPI_MCA_oob_tcp_if_include: "172.20.0.0/16"
  OMPI_MCA_btl_tcp_if_include: "172.20.0.0/16"

scheduler:
  name: slurm
  job_name: clio_cte_bench_baremetal_sbatch_2n
  nodes: 2
  ntasks_per_node: 1
  partition: compute
  time: "00:15:00"
  exclude: "ares-comp-10,ares-comp-11"
  output: slurm-%j.out
  error: slurm-%j.err
  # jarvis captures whatever env the shell that runs `jarvis ppl run`
  # has. Without module loads here, the captured PATH has no mpiexec
  # and no spack-provided libs -- downstream Pssh-launched workloads
  # then start with a sparse env. Three plain `module load` lines.
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load openmpi/5.0.5-x2kvx5l'
    - 'module load openmpi/5.0.5-x2kvx5l/gcc/11.4.0/ior'

pkgs:
  - pkg_type: jarvis_clio_core.clio_runtime
    pkg_name: runtime
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: "shm"
    log_level: "info"
    sleep: 4

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte_core
    devices:
      - ["ram::cte_ram_tier1", "8GB", 1.0]
    dpe_type: "max_bw"
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    # Pssh fans the compose to every node, each compose hits its local
    # admin via pool_query: local; both nodes end up with a properly-
    # configured clio_cte_core container.
    pool_query: "local"

  - pkg_type: jarvis_clio_core.clio_cte_bench
    pkg_name: bench
    # 1 thread x depth-8 in-flight x 4096 ops of 1 MiB = 4 GiB per node.
    # nprocs == nodes * ppn so the clio_cte_bench process fans 1-per-node
    # via the Pssh path inside the bench pkg.
    test_case: Put
    num_threads: 1
    depth: 8
    io_size: "1m"
    io_count: 4096
    nprocs: 2
    ppn: 1
    init_runtime: false
