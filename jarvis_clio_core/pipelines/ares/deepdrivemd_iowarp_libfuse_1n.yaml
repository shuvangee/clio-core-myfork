# Pipeline: DeepDriveMD workload reusing the prebuilt
# deepdrivemd_apptainer_test SIF, with IOWarp's FUSE adapter providing
# the CTE-backed mount under /mnt/clio_cte.
#
# See biobb_iowarp_libfuse_1n.yaml for the full layered explanation.
# Same architecture: clio_runtime + clio_cte + clio_cte_libfuse on the
# host; the existing DDMD SIF runs unchanged inside an apptainer
# instance with $HOME/clio_cte bind-mounted at /mnt/clio_cte.

name: deepdrivemd_iowarp_libfuse_1n

install_manager: container
container_engine: apptainer
container_image: deepdrivemd_apptainer_test

container_binds:
  - /home/llogan/clio_cte:/mnt/clio_cte
  - /home/llogan/clio_cte:/home/llogan/clio_cte

pkgs:
  - pkg_type: jarvis_clio_core.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: tcp
    log_level: info
    sleep: 4

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "8GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none

  - pkg_type: jarvis_clio_core.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: /home/llogan/clio_cte
    sleep: 2

  - pkg_type: builtin.deepdrivemd
    pkg_name: deepdrivemd
    nprocs: 1
    ppn: 1
    iterations: 2
    # WORKDIR (radical sandbox, config) lives on $HOME (NFS), NOT on
    # FUSE: DDMD's `shutil.copy(args.config, cfg.experiment_directory)`
    # calls chmod, which clio_cte_fuse returns ENOSYS for. The actual
    # FUSE traffic comes from /opt/ddmd_io_task.sh writing into
    # /mnt/clio_cte/ddmd (the cte_fuse mountpoint), so DDMD still
    # exercises clio_cte_libfuse end-to-end.
    out: /home/llogan/jarvis-runs/deepdrivemd_iowarp_libfuse_1n
