# Pipeline: IOWarp runtime + CTE + clio_adapters (HDF5 VOL) + LAMMPS (H5MD)
# Purpose: Exercise the IOWarp HDF5 VOL connector with LAMMPS writing an
# H5MD trajectory.
#
# Notes:
#  - install_manager: container is mandatory — see iowarp_container_test.yaml.
#  - pull_policy: never keeps docker-compose from trying to pull the local
#    pipeline image.
#  - The LAMMPS input script lives next to this YAML; we bind-mount this
#    directory at the same absolute path inside the container so lmp -in
#    ... can read it. Edit the bind-mount host path if your checkout lives
#    elsewhere.
#  - Jarvis copies the effective hostfile into <shared_dir>/hostfile on
#    save; shared_dir is already bind-mounted, so no /tmp pass-through is
#    needed.

name: iowarp_lammps_h5md_test

install_manager: container
container_engine: docker
container_base: ubuntu:24.04

container_extensions:
  pull_policy: never
  # io_uring_setup is blocked by Docker's default seccomp profile —
  # IOWarp's bdev backend needs it.
  security_opt:
    - seccomp=unconfined
  volumes:
    - /mnt/common/llogan/iowarp/core/jarvis_clio_core/pipelines/container:/mnt/common/llogan/iowarp/core/jarvis_clio_core/pipelines/container:ro

pkgs:
  # See iowarp_container_test.yaml for the Library-injection explanation.
  - pkg_type: builtin.hdf5
    deploy_mode: container
  - pkg_type: builtin.adios2
    deploy_mode: container
  - pkg_type: builtin.compress_libs
    deploy_mode: container

  - pkg_type: jarvis_clio_core.clio_runtime
    deploy_mode: container
    git_branch: transparent-compress
    cmake_preset: release-adapter
    port: 9413
    sleep: 2

  - pkg_type: jarvis_clio_core.clio_cte
    deploy_mode: container

  - pkg_type: builtin.lammps
    deploy_mode: container
    nprocs: 1
    ppn: 1
    kokkos_gpu: false
    script: /mnt/common/llogan/iowarp/core/jarvis_clio_core/pipelines/container/lammps_h5md.in
    out: /tmp/lammps_h5md
    base_image: ubuntu:24.04

interceptors:
  - pkg_type: jarvis_clio_core.clio_adapters
    vol: true
    include:
      - ".*lammps_h5md.*"
    adapter_page_size: 1M
