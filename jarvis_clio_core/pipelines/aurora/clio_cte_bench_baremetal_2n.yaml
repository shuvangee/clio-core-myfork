# Pipeline: WRP CTE benchmark — Aurora baremetal, 2-node minimal.
# Smallest cross-node test: 2 nodes × 1 rank each. If this passes,
# SWIM gossip works on a single edge and the 8-node failure is about
# scale (>2 peers, partial-mesh probe loss). If it hangs the same way,
# the gossip layer is broken even at 2 nodes.

name: clio_cte_bench_aurora_baremetal_2n

# Pin chimaera's ZMQ TCP traffic (server bind + client source-bind) to a
# single Aurora HSN rail so connections are symmetric. Without this, the
# FQDN can resolve to one of hsn0..hsn7 while the kernel picks a
# different outbound NIC, causing silent drops at scale.
env:
  LIGHTBEAM_TCP_DEVICE: hsn0

pkgs:
  - pkg_type: jarvis_clio_core.clio_runtime
    pkg_name: runtime
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: "tcp"
    log_level: "info"
    sleep: 4

  - pkg_type: jarvis_clio_core.clio_cte
    pkg_name: cte_core
    devices:
      - ["ram::cte_ram_tier1", "8GB", 1.0]
    dpe_type: "max_bw"
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000

  - pkg_type: jarvis_clio_core.clio_cte_bench
    pkg_name: cte_bench
    test_case: "PutGet"
    num_threads: 1
    depth: 1
    io_size: "1m"
    io_count: 100
    nprocs: 2
    ppn: 1
    init_runtime: false
    output_file: cte_bench.log
