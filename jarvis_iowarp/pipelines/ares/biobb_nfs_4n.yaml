# Pipeline: BioExcel MD Setup workload, Apptainer + sbatch on Ares, 4 nodes,
# writing directly to NFS under ${HOME}/jarvis-runs/biobb_nfs_4n.
#
# This is the NFS-baseline counterpart to biobb_iowarp_libfuse_4n.yaml --
# same SIF, same workload params (20 replicates, nprocs=4 ppn=1), same
# scheduler config, just no IOWarp stack and out path is plain NFS rather
# than a clio_cte_fuse mount. Apples-to-apples comparison for FUSE+CTE
# overhead vs raw NFS.

name: biobb_nfs_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: biobb_wf_md_setup_apptainer_test

container_binds:
  # biobb_io_only.sh override removed — the SIF's real /opt/run_batch.sh
  # → /opt/run_md_setup.py runs the genuine GROMACS+biobb pipeline on the
  # bundled 1AKI lysozyme. NFS-baseline counterpart of biobb_iowarp_libfuse_4n.
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  # biobb_md_extend.sh — same as the CTE counterpart, gives this NFS
  # baseline a real MD trajectory per rep instead of setup-only output.
  - ${HOME}/jarvis-bench-scripts/biobb_md_extend.sh:/opt/biobb_md_extend.sh

# /usr/bin/ssh built against OpenSSL 3.0.x; strip LD_LIBRARY_PATH so a conda
# env's libcrypto 3.6.x doesn't trigger "OpenSSL version mismatch" on the
# ssh hops PRTE/PMIx perform. Harmless even though there's no IOWarp stack
# here; biobb still uses MPI inside the container.
ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  BIOBB_FIX_MB: "32"
  BIOBB_P2G_MB: "128"
  BIOBB_EDIT_MB: "128"
  BIOBB_SOLV_MB: "700"
  BIOBB_TOP_MB: "16"

scheduler:
  name: slurm
  job_name: biobb_nfs_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  # Same nodelist as the CTE counterpart (biobb_iowarp_libfuse_4n) so the
  # NFS-vs-CTE comparison runs on identical hardware.
  nodelist: "ares-comp-[28-31]"
  time: "00:15:00"
  output: slurm-%j.out
  error: slurm-%j.err
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/biobb_nfs_4n'

pkgs:
  - pkg_type: builtin.biobb_wf_md_setup
    pkg_name: biobb
    nprocs: 4
    ppn: 1
    # Match the CTE counterpart (biobb_iowarp_libfuse_4n) — same per-rep
    # workflow (setup + EM + production NVT MD) so NFS-vs-CTE comparison
    # is apples-to-apples. With md_steps=5000 and md_nstxout=10 each rep
    # writes ~40 MB trajectory + ~3 MB setup = ~45 MB; 80 reps × 45 MB =
    # ~3.6 GB total NFS load, distributed across 4 hosts.
    replicates: 80
    parallel_reps: 2
    omp_threads: 4
    # md_steps=1000 (2 ps simulated, ~5-15s wall). md_nstxout=2 → ~500
    # frames × ~80 KB = ~40 MB trajectory per rep. Same as CTE counterpart.
    md_steps: 1000
    md_nstxout: 2
    out: ${HOME}/jarvis-runs/biobb_nfs_4n
