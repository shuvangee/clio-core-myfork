# Pipeline: DeepDriveMD workload, Apptainer + sbatch on Ares, 4 nodes,
# with IOWarp's FUSE adapter providing the CTE-backed mount under
# ${HOME}/clio_cte_deepdrivemd_4n.
#
# RADICAL Pilot is configured for local.localhost in the upstream template,
# so the workload itself runs on the SLURM head node; the 4-node allocation
# matches the project deployment convention and gives IOWarp room to spread
# CTE storage across the four daemons. iter=1, num_tasks=20, MD_BYTES=1 GiB
# → ~20 GiB MD writes that route through the FUSE adapter on the head node.
#
# WORKDIR (RADICAL sandbox + DDMD config) lives on $HOME (NFS), NOT on FUSE:
# DDMD's `shutil.copy(args.config, cfg.experiment_directory)` calls chmod,
# which clio_cte_fuse returns ENOSYS for. The actual FUSE traffic is from
# /opt/run_ddmd.sh writing into the FUSE mountpoint.

name: deepdrivemd_iowarp_libfuse_4n

install_manager: container
container_engine: apptainer
container_image: deepdrivemd_apptainer_test

container_binds:
  # ddmd_run_io_only.sh override removed — the SIF's real /opt/run_ddmd.sh
  # runs the genuine RADICAL Pilot DeepDriveMD pipeline. Re-add the
  # io_only bind to switch back to the I/O proxy.
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  - ${HOME}/clio_cte_deepdrivemd_4n:/mnt/clio_cte
  - ${HOME}/clio_cte_deepdrivemd_4n:${HOME}/clio_cte_deepdrivemd_4n

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"
  DDMD_MD_BYTES: "1073741824"
  DDMD_MD_BS:    "8388608"

scheduler:
  name: slurm
  job_name: deepdrivemd_iowarp_libfuse_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  nodelist: "ares-comp-[10-13]"
  time: "00:10:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    # Clean stale FUSE + ensure mountpoint exists before apptainer instance start.
    - 'fusermount3 -u /home/llogan/clio_cte_deepdrivemd_4n 2>/dev/null || umount -l /home/llogan/clio_cte_deepdrivemd_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_deepdrivemd_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_deepdrivemd_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.deepdrivemd
    pkg_name: deepdrivemd
    nprocs: 16
    ppn: 16
    iterations: 1
    num_tasks: 20
    replicates: 8
    # parallel_reps>1 switches to PsshExecInfo + per-host wait -n batching.
    # RADICAL Pilot inside each rep is configured for local.localhost so it
    # only spans one host per replicate. 8 reps / 4 nodes = 2 per host;
    # parallel_reps=2 runs 2 RADICAL pilots concurrently per host.
    parallel_reps: 2
    omp_threads: 4
    # WORKDIR (RADICAL sandbox + DDMD config) MUST live on NFS, not on
    # the FUSE mount. RADICAL's `shutil.copy(args.config, ...)` calls
    # chmod on the destination, which clio_cte_fuse returns ENOSYS for —
    # which crashed our previous run (15467) at start-up. The actual
    # FUSE traffic for this pipeline comes from the inside-container
    # /opt/run_ddmd.sh writing into /mnt/clio_cte/ddmd (the FUSE
    # mountpoint bound at /mnt/clio_cte), so the CTE adapter is still
    # exercised end-to-end despite WORKDIR being on NFS.
    out: ${HOME}/jarvis-runs/deepdrivemd_iowarp_libfuse_4n
