# Pipeline: MetaGEM workload, Apptainer + sbatch on Ares, 4 nodes,
# writing through IOWarp's FUSE adapter mounted at ${HOME}/clio_cte_metagem_4n
# on each host (NFS-shared path, per-host FUSE namespace). Same pattern as
# deepdrivemd_iowarp_libfuse_4n.yaml: clio_runtime / clio_cte / clio_cte_libfuse
# run with deploy_mode: default (host bare-metal); only metagem itself runs
# inside the SIF, where it sees the FUSE mount via --bind into /mnt/clio_cte.
#
# Apptainer's --bind uses MS_SLAVE on the container side, so clio_cte_libfuse
# mounting FUSE on the host AFTER apptainer instance start still propagates
# into the container's /mnt/clio_cte. Only requirement: the bind source must
# exist as a directory at instance-start time; pre_cmds mkdir handles that.
# (Metagem itself doesn't link libfuse3 — it just opens /mnt/clio_cte/* like
# any other directory; the kernel routes through FUSE to the host's
# clio_cte_fuse daemon. No FUSE awareness needed inside the container.)
#
# 4-node allocation; sample_replicates=12 → ~22 GB fastp I/O across 36
# samples that route through the FUSE adapter.

name: metagem_iowarp_libfuse_4n

install_manager: container
container_engine: apptainer
container_image: metagem_apptainer_test

container_binds:
  - ${HOME}/jarvis-bench-cache/metagem-stage:/tmp/metagem-cache:ro
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  # Host-side clio_cte_fuse mount bound into the container at /mnt/clio_cte.
  # The dir must exist at instance-start (created by the pre_cmd below);
  # apptainer's --bind uses MS_SLAVE so the FUSE mount that clio_cte_libfuse
  # establishes on the host later still propagates into the container.
  - ${HOME}/clio_cte_metagem_4n:/mnt/clio_cte

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"

scheduler:
  name: slurm
  job_name: metagem_iowarp_libfuse_4n
  nodes: 4
  ntasks_per_node: 24
  partition: debug
  nodelist: "ares-comp-[03-06]"
  time: "00:05:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    # FUSE bind source. NFS-shared so a head-node mkdir is visible to every
    # node; each node will mask it with its own clio_cte_fuse mount during
    # clio_cte_libfuse start.
    - 'fusermount3 -u /home/llogan/clio_cte_metagem_4n 2>/dev/null || umount -l /home/llogan/clio_cte_metagem_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_metagem_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_metagem_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.metagem
    pkg_name: metagem
    nprocs: 1
    cores: 16
    sample_replicates: 12
    # parallel_reps>1 switches to PsshExecInfo + per-host wait -n batching.
    # 12 sample-replicate batches / 4 nodes = 3 per host; parallel_reps=4
    # caps in-flight at 3 (limited by local count). Pure dd I/O so high
    # concurrency is fine.
    parallel_reps: 4
    omp_threads: 4
    out: /mnt/clio_cte/metagem
