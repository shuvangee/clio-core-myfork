# Pipeline: RNA-Seq STAR + DESeq2 workload, Apptainer + sbatch on Ares,
# 4 nodes, with IOWarp's FUSE adapter providing the CTE-backed mount under
# ${HOME}/clio_cte_rna_seq_star_deseq2_4n.
#
# Single-host execution on the SLURM head (snakemake is not multi-host);
# the 4-node allocation reserves the resources and lets IOWarp spread its
# CTE storage across 4 daemons. cores=16 lets snakemake-internal threading
# saturate. replicates=1 since one full pass is already ~9 min wall on the
# bundled ngs-test-data.

name: rna_seq_star_deseq2_iowarp_libfuse_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: rna_seq_star_deseq2_apptainer_test

container_binds:
  # rna_seq_io_only.sh override removed — the SIF's real /opt/run_rnaseq.sh
  # runs the genuine snakemake STAR + DESeq2 workflow on the bundled
  # ngs-test-data. Re-add the io_only bind to switch back to the I/O proxy.
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  - ${HOME}/clio_cte_rna_seq_star_deseq2_4n:/mnt/clio_cte
  - ${HOME}/clio_cte_rna_seq_star_deseq2_4n:${HOME}/clio_cte_rna_seq_star_deseq2_4n

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"
  RNASEQ_BAM_GB: "5"
  RNASEQ_TSV_MB: "64"

scheduler:
  name: slurm
  job_name: rna_seq_iowarp_libfuse_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  nodelist: "ares-comp-[18-21]"
  time: "00:10:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'fusermount3 -u /home/llogan/clio_cte_rna_seq_star_deseq2_4n 2>/dev/null || umount -l /home/llogan/clio_cte_rna_seq_star_deseq2_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_rna_seq_star_deseq2_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_rna_seq_star_deseq2_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.rna_seq_star_deseq2
    pkg_name: rna_seq_star_deseq2
    nprocs: 1
    cores: 16
    replicates: 8
    # parallel_reps>1 switches to PsshExecInfo + per-host wait -n batching.
    # snakemake itself is single-host; 8 reps / 4 nodes = 2 per host;
    # parallel_reps=2 runs 2 snakemake instances concurrently per host.
    parallel_reps: 2
    omp_threads: 4
    out: ${HOME}/clio_cte_rna_seq_star_deseq2_4n/rna_seq_star_deseq2
