# Pipeline: MetaGEM real workflow on IOWarp FUSE with transparent
# compression on the I/O path, Apptainer + sbatch on Ares, 4 nodes.
#
# Variant of metagem_iowarp_libfuse_4n.yaml:
#   - real_workflow: true   -> /opt/run_metagem.sh (snakemake + fastp on
#                              the bundled toy FASTQ data). Compressible
#                              data, unlike the dd /dev/urandom proxy.
#   - clio_compress inserted -> clio_cte_compressor at pool 512.0 sits in
#                              front of clio_cte_core (moved to 513.0).
#                              Adapters' WRP_CTE_CLIENT_INIT defaults to
#                              pool 512.0, so PutBlob/GetBlob land on the
#                              compressor first; it forwards (optionally
#                              compressed) blobs to next_pool_id=513.0.
#
# Predictor configuration:
#   - compress_lib: snappy (static). No qtable_model_path: we don't have
#     a pre-trained JSON, so dynamic mode would fall through to a
#     ratio=2.0 heuristic. Static snappy is the cleanest direct
#     comparison: every chunk gets compressed with snappy regardless
#     of predicted ratio.
#   - Producer-consumer tracking is unconditional (Runtime::Create spawns
#     AsyncPollConsumers @ 5s); the compressor periodically polls each
#     consumer node for CPU% / worker_load / queued / blocked task
#     counts via PollNodeLoad. The samples are logged at kDebug today;
#     they're not yet used by snappy-static path but they ARE collected.
#
# Pool / port layout:
#   admin                              -> chimaera_admin (1.0)
#   clio_cte_compressor (entrypoint)    -> 512.0
#   clio_cte_core_storage  (downstream) -> 513.0
#   FUSE adapter -> WRP_CTE_CLIENT_INIT -> 512.0
#
# All other deploy semantics match metagem_iowarp_libfuse_4n.yaml:
# host-side clio_runtime / clio_cte / clio_cte_libfuse, container-only
# metagem with --bind of the host FUSE mountpoint.

name: metagem_iowarp_libfuse_compress_real_4n

install_manager: container
container_engine: apptainer
container_image: metagem_apptainer_test

container_binds:
  - ${HOME}/jarvis-bench-cache/metagem-stage:/tmp/metagem-cache:ro
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  - ${HOME}/clio_cte_metagem_compress_real_4n:/mnt/clio_cte

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"

scheduler:
  name: slurm
  job_name: metagem_iowarp_libfuse_compress_real_4n
  nodes: 4
  ntasks_per_node: 24
  partition: debug
  nodelist: "ares-comp-[03-06]"
  # Real fastp workflow takes longer than dd. Headroom for snakemake
  # plan + 36 paired-end qfilter rules across 4 hosts. Debug partition
  # caps at 1h; 20m is safely inside.
  time: "00:20:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'fusermount3 -u /home/llogan/clio_cte_metagem_compress_real_4n 2>/dev/null || umount -l /home/llogan/clio_cte_metagem_compress_real_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_metagem_compress_real_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    # Moved downstream of the compressor; adapter entrypoint stays 512.0,
    # which now belongs to clio_cte_compressor.
    pool_name: clio_cte_core_storage
    pool_id: 513.0
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_compress
    pkg_name: cte_compress
    deploy_mode: default
    pool_name: clio_cte_compressor
    pool_id: 512.0
    next_pool_id: 513.0
    pool_query: "local"
    # Static-snappy. Dynamic prediction would require a trained qtable
    # JSON; none exists in tree yet. Producer-consumer tracking (the
    # AsyncPollConsumers 5s probe of consumer node CPU + worker load) is
    # always-on regardless of this setting.
    compress_lib: snappy
    compress_preset: default
    # Leave qtable_model_path / linreg_model_path / dnn_model_weights_path
    # blank; static lib path bypasses the predictor.

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_metagem_compress_real_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.metagem
    pkg_name: metagem
    nprocs: 1
    cores: 16
    sample_replicates: 12
    parallel_reps: 4
    omp_threads: 4
    # real_workflow=true -> /opt/run_metagem.sh inside the container,
    # i.e. snakemake + fastp over the bundled toy FASTQ dataset. fastp
    # outputs compressed FASTQ.gz under {out}/<host>/qfiltered/, which is
    # the I/O clio_compress sees as PutBlob payloads.
    real_workflow: true
    out: /mnt/clio_cte/metagem
