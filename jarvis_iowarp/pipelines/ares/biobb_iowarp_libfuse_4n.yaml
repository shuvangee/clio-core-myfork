# Pipeline: BioExcel MD Setup workload, Apptainer + sbatch on Ares, 4 nodes,
# with IOWarp's FUSE adapter providing the CTE-backed mount under
# ${HOME}/clio_cte_biobb_4n.
#
# Stack on each of the 4 SLURM-allocated nodes:
#   clio_runtime     — chimaera daemon (baremetal on host)
#   clio_cte         — CTE storage tier (25 GB RAM per node)
#   clio_cte_libfuse — clio_cte_fuse mounts the CTE pool at the host path
#                     ${HOME}/clio_cte_biobb_4n
#   biobb_wf_md_setup — runs INSIDE the prebuilt biobb_wf_md_setup_apptainer_test
#                       SIF; the FUSE mountpoint is bind-mounted into the
#                       container so workload writes flow through the FUSE
#                       adapter into clio_cte → clio_runtime.
#
# Per-host budget (20 reps × ~1020 MiB = ~20 GiB) fits under the 25 GB CTE
# tier; total written across 4 nodes ~80 GiB.

name: biobb_iowarp_libfuse_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: biobb_wf_md_setup_apptainer_test

container_binds:
  # biobb_io_only.sh override removed — the SIF's real /opt/run_batch.sh
  # → /opt/run_md_setup.py runs the genuine GROMACS+biobb pipeline on the
  # bundled 1AKI lysozyme. Re-add the io_only bind to switch back to the
  # I/O proxy.
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  - ${HOME}/clio_cte_biobb_4n:/mnt/clio_cte
  - ${HOME}/clio_cte_biobb_4n:${HOME}/clio_cte_biobb_4n
  # biobb_md_extend.sh chains real EM + production NVT mdrun after the
  # setup-only /opt/run_batch.sh, decoupling trajectory data volume from
  # compute step count via nstxout-compressed. Triggered when md_steps>0.
  - ${HOME}/jarvis-bench-scripts/biobb_md_extend.sh:/opt/biobb_md_extend.sh

# /usr/bin/ssh built against OpenSSL 3.0.x; strip LD_LIBRARY_PATH so a conda
# env's libcrypto 3.6.x doesn't trigger "OpenSSL version mismatch" on the
# ssh hops PRTE/PMIx perform.
ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

# Route OpenMPI data plane over the 40 GbE fabric (enp47s0np0, 172.25/16),
# keep PRTE/OOB on eno1 (172.20/16) so SLURM's spawn graph still works.
mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  # Node-local chimaera memfd dir (${HOSTNAME} expanded by the remote shell):
  # symlinks point into /proc/<pid>/fd/<n> on the creating node only, so
  # sharing the dir across nodes corrupts shm_open lookups.
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"
  BIOBB_FIX_MB: "32"
  BIOBB_P2G_MB: "128"
  BIOBB_EDIT_MB: "128"
  BIOBB_SOLV_MB: "700"
  BIOBB_TOP_MB: "16"

scheduler:
  name: slurm
  job_name: biobb_iowarp_libfuse_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  # Pin to a specific 4-node set so this job and the parallel-submitted
  # montage run land on disjoint nodes (montage uses ares-comp-[03-06]
  # on the debug partition).
  nodelist: "ares-comp-[28-31]"
  time: "00:10:00"
  output: slurm-%j.out
  error: slurm-%j.err
  # Append "-40g" to every hostname jarvis-cd writes into the pipeline
  # hostfile so chimaera daemon↔daemon DEALER/ROUTER traffic flows over
  # enp47s0np0 (40 GbE, 172.25/16). /etc/hosts maps `ares-comp-N-40g` →
  # `172.25.101.N`. jarvis-cd's `suffix:` key handles this in scheduler.py.
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    # PRTE/PMIx default to /tmp for the per-job session dir; route to NFS
    # to avoid "No space left on device" on nodes with small / partitions.
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    # The FUSE mountpoint must exist BEFORE jarvis pre-starts the global
    # apptainer instance (which happens at the very top of `ppl run`,
    # before any package's start() runs). Without this dir present,
    # apptainer's `--bind ${HOME}/clio_cte_biobb_4n:/mnt/clio_cte` fails with
    # "mount source ... doesn't exist" and the instance start aborts;
    # subsequent biobb `apptainer exec --instance` then errors with
    # "no instance found". The dir is on NFS, so creating it on the batch
    # node makes it visible on all 4 compute nodes simultaneously.
    # Clean any stale FUSE mount from a previously-cancelled run on this
    # batch node — without this, mkdir errors with "Transport endpoint is
    # not connected" and the batch script aborts before it can launch.
    - 'fusermount3 -u /home/llogan/clio_cte_biobb_4n 2>/dev/null || umount -l /home/llogan/clio_cte_biobb_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_biobb_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    # SWIM disabled on multi-node sbatch: HeartbeatProbe becomes a no-op,
    # IsAlive() returns true for every peer. Avoids self-fence kFatal that
    # was killing first-suspecting nodes mid-run at 4n+ IOR.
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    # pool_query: local + Pssh-fanning the compose to every node means each
    # node's `chimaera compose` talks to its local admin container and
    # creates clio_cte_core there with the proper storage config. No
    # broadcast routing or cross-node admin propagation required.
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_biobb_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.biobb_wf_md_setup
    pkg_name: biobb
    nprocs: 4
    ppn: 1
    # Sized so each rep does setup + a real production MD run. Trajectory
    # data is the dominant output: with md_steps=5000 (10 ps simulated)
    # and md_nstxout=10 (XTC frame every 20 fs), each rep writes ~500
    # frames × ~80 KB = ~40 MB trajectory in addition to the ~3 MB setup
    # files. Total per-rep ~45 MB. Drop replicates so total wall stays
    # near the 5-min target while data scales up.
    replicates: 80
    parallel_reps: 2
    omp_threads: 4
    # md_steps=1000 (2 ps simulated, ~5-15s wall on CPU with PME for
    # 1AKI's ~26k solvated atoms). md_nstxout=2 → ~500 frames × ~80 KB
    # = ~40 MB trajectory per rep. 80 reps × 40 MB = ~3 GB total
    # trajectory data. Tune md_steps for wall, md_nstxout for data
    # density independently.
    md_steps: 1000
    md_nstxout: 2
    out: ${HOME}/clio_cte_biobb_4n/biobb_wf_md_setup
