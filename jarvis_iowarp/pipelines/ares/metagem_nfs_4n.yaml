# Pipeline: MetaGEM workload, Apptainer + sbatch on Ares, 4 nodes,
# writing directly to NFS under ${HOME}/jarvis-runs/metagem_nfs_4n.
#
# NFS-baseline counterpart to metagem_iowarp_libfuse_4n.yaml — same SIF,
# same workload params, same scheduler config, just no IOWarp stack and
# out path is plain NFS rather than a clio_cte_fuse mount. Apples-to-apples
# comparison for FUSE+CTE overhead vs raw NFS.

name: metagem_nfs_4n

install_manager: container
container_engine: apptainer
container_image: metagem_apptainer_test

container_binds:
  # Pre-staged toy dataset bind-mount (same path the FUSE counterpart uses
  # so the inline shell skips the slow wget download).
  - ${HOME}/jarvis-bench-cache/metagem-stage:/tmp/metagem-cache:ro
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"

scheduler:
  name: slurm
  job_name: metagem_nfs_4n
  nodes: 4
  ntasks_per_node: 24
  partition: debug
  nodelist: "ares-comp-[03-06]"
  time: "00:05:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/metagem_nfs_4n'

pkgs:
  - pkg_type: builtin.metagem
    pkg_name: metagem
    nprocs: 1
    cores: 16
    sample_replicates: 12
    # Match the FUSE counterpart 1:1 so the comparison is apples-to-apples.
    parallel_reps: 4
    omp_threads: 4
    out: ${HOME}/jarvis-runs/metagem_nfs_4n
