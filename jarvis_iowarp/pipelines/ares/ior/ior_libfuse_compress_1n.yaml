# Pipeline: IOWarp FUSE + IOR with transparent compressor — 1 node x 1 ppn.
# Mirrors aurora/ior_libfuse_1n.yaml but inserts wrp_compress in front of
# wrp_cte so writes through the FUSE mount hit the compressor pool first.
#
# Pool layout:
#   wrp_compress (wrp_cte_compressor) at 512.0 — entrypoint targeted by
#                                                 WRP_CTE_CLIENT_INIT
#   wrp_cte      (wrp_cte_core)       at 513.0 — downstream storage
#
# Stack:
#   wrp_runtime     -> chimaera daemon
#   wrp_cte         -> CTE storage tiers at pool 513.0
#   wrp_compress    -> wrp_cte_compressor at 512.0, next_pool_id=513.0,
#                       snappy as the default static library
#   wrp_cte_libfuse -> mounts ${HOME}/libfuse_compress via wrp_cte_fuse
#   builtin.ior     -> POSIX writes through the mountpoint

name: iowarp_ior_libfuse_compress_ares_1n

pkgs:
  - pkg_type: jarvis_iowarp.wrp_runtime
    pkg_name: runtime
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: "tcp"
    log_level: "info"
    sleep: 4

  - pkg_type: jarvis_iowarp.wrp_cte
    pkg_name: cte_core
    pool_name: wrp_cte_core_storage
    pool_id: 513.0
    devices:
      - ["ram::cte_ram_tier1", "8GB", 1.0]
    dpe_type: "max_bw"
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: "none"

  - pkg_type: jarvis_iowarp.wrp_compress
    pkg_name: cte_compress
    pool_name: wrp_cte_compressor
    pool_id: 512.0
    next_pool_id: 513.0
    pool_query: local
    compress_lib: snappy
    compress_preset: default

  - pkg_type: jarvis_iowarp.wrp_cte_libfuse
    pkg_name: cte_fuse
    mountpoint: /tmp/libfuse_compress
    sleep: 2

  - pkg_type: builtin.ior
    pkg_name: ior
    api: posix
    write: true
    read: true
    nprocs: 1
    ppn: 1
    xfer: 1m
    block: 256m
    out: /tmp/libfuse_compress/ior_compress_1n.bin
