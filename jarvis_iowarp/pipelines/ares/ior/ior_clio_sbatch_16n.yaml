# IOR + CTE via the clio POSIX LD_PRELOAD adapter — SLURM sbatch, 16 nodes.
#
# "clio" path (NOT FUSE): the wrp_adapters interceptor LD_PRELOADs
# libwrp_cte_posix.so into the IOR ranks; any path prefixed "clio::"
# is rerouted through the CTE client (shm IPC to the node-local
# chimaera daemon). The adapter strips the prefix before touching the
# backend, so there is no FUSE mount and no wrp_cte_libfuse pkg.
#
# Layout:
#   wrp_runtime  -> chimaera daemon per node (shm IPC; daemon<->daemon
#                   over the 40 GbE -40g fabric)
#   wrp_cte      -> CTE pool with a RAM tier per node (pool 512.0,
#                   adapter entrypoint; NO compressor in this pipeline)
#   wrp_adapters -> cte_posix interceptor, LD_PRELOAD libwrp_cte_posix.so
#   builtin.ior  -> POSIX fpp writes/reads through clio::<path>
#
# Build prereq (already satisfied on this host): the POSIX adapter only
# builds with WRP_CORE_ENABLE_ELF=ON + WRP_CTE_ENABLE_POSIX_ADAPTER=ON
# (the release-fuse preset has ELF OFF, so libwrp_cte_posix.so had to
# be built explicitly). libelf needs PKG_CONFIG_PATH to include
# /usr/lib/x86_64-linux-gnu/pkgconfig at configure time.

name: ior_clio_sbatch_16n

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  # CHI_MEMFD_DIR must resolve to the SAME node-local dir for both the
  # chimaera daemon (launched per-node via pssh) AND the IOR ranks
  # (spawned via `mpiexec -x CHI_MEMFD_DIR=...`). The FUSE pipelines use
  # ".../_${HOSTNAME}" which works only because the ssh hop expands
  # ${HOSTNAME} per-node; mpiexec -x forwards ONE literal string to every
  # rank on all 16 nodes, so a ${HOSTNAME} path would send every rank to
  # the head node's dir and the adapter's CTE client gets
  # "shm_open: No such file or directory", falling back to a kernel
  # open of the literal clio:: path (ENOENT). /dev/shm is a per-node
  # tmpfs (RAM-backed, 48G here, NOT the small / partition), so the same
  # literal path is independently node-local everywhere — no per-node
  # shell expansion needed. Username is constant so the literal is safe
  # through both the ssh inline and mpiexec -x.
  CHI_MEMFD_DIR: "/dev/shm/chimaera_llogan"

scheduler:
  name: slurm
  job_name: ior_clio_sbatch_16n
  nodes: 16
  ntasks_per_node: 1
  # ConstrainCores=yes + ntasks_per_node=1 gives the per-task cgroup one
  # core; chimaera's worker threads + IOR ranks need headroom. Oversize
  # cpus_per_task so the whole node's cores are available to the step.
  cpus_per_task: 40
  partition: compute
  # IOR never legitimately exceeds 5 min on this cluster; past that it
  # is hanging (cancel + diagnose, do not wait).
  time: "00:05:00"
  output: slurm-%j.out
  error: slurm-%j.err
  # -40g suffix routes chimaera daemon<->daemon over the 40 GbE NIC.
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l ior/3.3.0-fihmxeb'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/ior_clio_sbatch_16n'

pkgs:
  - pkg_type: jarvis_iowarp.wrp_runtime
    pkg_name: runtime
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: "shm"
    log_level: "info"
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.wrp_cte
    pkg_name: cte_core
    devices:
      # 24 ranks/node x 64 MiB block = 1.5 GiB/node own writes; with
      # hash spreading each node's bdev also receives the cross-hash
      # half. 32 GB leaves generous headroom.
      - ["ram::cte_ram_tier1", "32GB", 1.0]
    dpe_type: "max_bw"
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    pool_query: "local"
    # No compressor: iowarp_compress stays at its 'none' default so
    # wrp_cte_core is the pool-512.0 entrypoint with no shim in front.

  - pkg_type: builtin.ior
    pkg_name: ior
    api: posix
    write: true
    read: true
    # Each chimaera daemon + CTE pool is node-local; shared-file IOR
    # would cross nodes and break by construction. file-per-process:
    # each rank writes a unique clio:: file routed to its own node.
    fpp: true
    nprocs: 384
    ppn: 24
    xfer: 1m
    block: 64m
    # clio:: prefix opts every open/read/write on this path into the
    # POSIX adapter; the prefix is stripped before the backend, so the
    # underlying file path is $HOME/jarvis-runs/ior_clio_sbatch_16n/...
    out: "clio::/home/llogan/jarvis-runs/ior_clio_sbatch_16n/ior.bin"
    interceptors: [cte_posix]

interceptors:
  - pkg_type: jarvis_iowarp.wrp_adapters
    pkg_name: cte_posix
    posix: true
