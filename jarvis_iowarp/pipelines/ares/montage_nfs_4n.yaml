# Pipeline: Montage workload, Apptainer + sbatch on Ares, 4 nodes,
# writing directly to NFS under ${HOME}/jarvis-runs/montage_nfs_4n.
#
# NFS-baseline counterpart to montage_iowarp_libfuse_4n.yaml -- same SIF,
# same workload params, same scheduler config, just no IOWarp stack and
# out path is plain NFS rather than a clio_cte_fuse mount. Apples-to-apples
# comparison for FUSE+CTE overhead vs raw NFS.

name: montage_nfs_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: montage_apptainer_test

container_binds:
  # montage_io_only.sh override removed — the SIF's real /opt/run_mosaic.sh
  # → mProjExec/mAddExec runs the genuine Montage 10-stage mosaic on the
  # bundled M17 J-band raw_images. NFS-baseline counterpart of
  # montage_iowarp_libfuse_4n.
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  MONTAGE_N_TILES: "20"
  MONTAGE_TILE_MB: "512"
  MONTAGE_MOSAIC_MB: "512"

scheduler:
  name: slurm
  job_name: montage_nfs_4n
  nodes: 4
  ntasks_per_node: 24
  # Same nodelist as the CTE counterpart (montage_iowarp_libfuse_4n) so
  # the NFS-vs-CTE comparison runs on identical hardware.
  partition: compute
  nodelist: "ares-comp-[22,23,25,26]"
  time: "00:15:00"
  output: slurm-%j.out
  error: slurm-%j.err
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/montage_nfs_4n'

pkgs:
  - pkg_type: builtin.montage
    pkg_name: montage
    nprocs: 4
    ppn: 1
    region: M17
    band: j
    # Sized to hit the user's "5 min on NFS" target: 400 mosaics / 4 hosts
    # = 100/host, parallel_reps=2 = 50 batches/host. Per-mosaic wall is
    # ~4s (real mProjExec/mAdd on M17 J-band 0.2°), so 50 × 4s ≈ 200s ≈
    # 3-5 min. CTE counterpart should be faster from in-memory tier +
    # bounded-async PutBlob path.
    mosaic_replicates: 400
    parallel_reps: 2
    omp_threads: 4
    out: ${HOME}/jarvis-runs/montage_nfs_4n
