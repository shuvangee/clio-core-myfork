# Pipeline: MetaGEM real workflow on IOWarp FUSE, NO transparent
# compression. Apptainer + sbatch on Ares, 4 nodes.
#
# Matched baseline for metagem_iowarp_libfuse_compress_real_4n.yaml.
# Same scheduler, same SIF, same real_workflow=true (snakemake + fastp
# on the bundled toy FASTQ), same 4-host fan-out. Only differences:
#   - No clio_compress pkg.
#   - clio_cte stays at the default pool 512.0 (adapter entrypoint),
#     no 512->513 hop through the compressor.
#
# Use this to factor out the compressor cost: wall-clock diff vs the
# compress variant is the clio_compress overhead (or savings) for real
# fastp FASTQ output.

name: metagem_iowarp_libfuse_real_4n

install_manager: container
container_engine: apptainer
container_image: metagem_apptainer_test

container_binds:
  - ${HOME}/jarvis-bench-cache/metagem-stage:/tmp/metagem-cache:ro
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  - ${HOME}/clio_cte_metagem_real_4n:/mnt/clio_cte

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"

scheduler:
  name: slurm
  job_name: metagem_iowarp_libfuse_real_4n
  nodes: 4
  ntasks_per_node: 24
  partition: debug
  nodelist: "ares-comp-[03-06]"
  time: "00:20:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'fusermount3 -u /home/llogan/clio_cte_metagem_real_4n 2>/dev/null || umount -l /home/llogan/clio_cte_metagem_real_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_metagem_real_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_metagem_real_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.metagem
    pkg_name: metagem
    nprocs: 1
    cores: 16
    sample_replicates: 12
    parallel_reps: 4
    omp_threads: 4
    real_workflow: true
    out: /mnt/clio_cte/metagem
