# Pipeline: Montage workload, Apptainer + sbatch on Ares, 4 nodes,
# with IOWarp's FUSE adapter providing the CTE-backed mount under
# ${HOME}/clio_cte_montage_4n.
#
# Each of the 4 nodes runs the mosaic_replicates loop in parallel via
# PsshExecInfo. Outputs are host-tagged (host-<name>/rep_NNN/) under the
# FUSE mount. Per-host: 30 reps × ~24 MB = ~720 MB total FITS — well
# under the 25 GB CTE tier.

name: montage_iowarp_libfuse_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: montage_apptainer_test

container_binds:
  # montage_io_only.sh override removed — the SIF's real /opt/run_mosaic.sh
  # → mProjExec/mAddExec runs the genuine Montage 10-stage mosaic on the
  # bundled 2MASS J-band raw_images. Re-add the io_only bind to switch
  # back to the I/O proxy.
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs
  - ${HOME}/clio_cte_montage_4n:/mnt/clio_cte
  - ${HOME}/clio_cte_montage_4n:${HOME}/clio_cte_montage_4n

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  CHI_MEMFD_DIR: "/home/llogan/iowarp_chimaera_tmp_${HOSTNAME}"
  MONTAGE_N_TILES: "20"
  MONTAGE_TILE_MB: "512"
  MONTAGE_MOSAIC_MB: "512"

scheduler:
  name: slurm
  job_name: montage_iowarp_libfuse_4n
  nodes: 4
  ntasks_per_node: 24
  # debug partition has 4 idle nodes (ares-comp-[03-06]) right now;
  # compute partition only has ares-comp-32 fully idle, so pinning here
  # ensures both jobs (montage + biobb) land on disjoint 4-node sets and
  # run in parallel.
  partition: compute
  nodelist: "ares-comp-[22,23,25,26]"
  time: "00:10:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    # FUSE mountpoint must exist BEFORE jarvis pre-starts the global
    # apptainer instance (happens at the top of `ppl run`, before any
    # package's start() runs); otherwise apptainer's --bind fails with
    # "mount source ... doesn't exist" and the workload's later
    # `apptainer exec --instance` errors with "no instance found".
    # NFS-shared, so creating on the batch node is visible on all nodes.
    # Clean any stale FUSE mount left over from a previously-cancelled
    # run on this batch node — fusermount3 returns ENOENT/Transport-not-
    # connected, then mkdir fails. Lazy-unmount handles the case where
    # fusermount3 itself can't reach the orphaned mount.
    - 'fusermount3 -u /home/llogan/clio_cte_montage_4n 2>/dev/null || umount -l /home/llogan/clio_cte_montage_4n 2>/dev/null || true'
    - 'mkdir -p /home/llogan/clio_cte_montage_4n'

pkgs:
  - pkg_type: jarvis_iowarp.clio_runtime
    pkg_name: runtime
    deploy_mode: default
    num_threads: 4
    client_data_segment_size: "2G"
    port: 9413
    ipc_mode: shm
    log_level: info
    sleep: 4
    swim_enabled: false

  - pkg_type: jarvis_iowarp.clio_cte
    pkg_name: cte_core
    deploy_mode: default
    devices:
      - ["ram::cte_ram_tier1", "25GB", 1.0]
    dpe_type: max_bw
    neighborhood: 1
    default_target_timeout_ms: 30000
    poll_period_ms: 5000
    iowarp_compress: none
    pool_query: "local"

  - pkg_type: jarvis_iowarp.clio_cte_libfuse
    pkg_name: cte_fuse
    deploy_mode: default
    mountpoint: ${HOME}/clio_cte_montage_4n
    sleep: 2
    extra_fuse_args: "-f"

  - pkg_type: builtin.montage
    pkg_name: montage
    nprocs: 4
    ppn: 1
    region: M17
    band: j
    # Sized to match the NFS counterpart (montage_nfs_4n) — 400 mosaics
    # produces ~30+ GB across 4 hosts. CTE should beat NFS wall using
    # the in-memory tier + bounded-async PutBlob path.
    mosaic_replicates: 400
    parallel_reps: 2
    omp_threads: 4
    out: ${HOME}/clio_cte_montage_4n/montage
